# BMCWEB Configuration for SONiC
# This file contains runtime configuration for the bmcweb service

# Network Configuration
BMCWEB_HTTPS_PORT=443
BMCWEB_BIND_ADDRESS=0.0.0.0

# Logging Configuration
BMCWEB_LOG_LEVEL=info

# Session Configuration
BMCWEB_SESSION_TIMEOUT=3600

# Security Configuration
BMCWEB_ENABLE_TLS=true
BMCWEB_ENABLE_MTLS=true

