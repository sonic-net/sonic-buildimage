#
#  /etc/rsyslog.conf    Configuration file for rsyslog.
#
#                       For more information see
#                       /usr/share/doc/rsyslog-doc/html/rsyslog_conf.html

# This file forwards container->host syslog with RELP preferred and UDP as
# automatic fallback so the image works on both newer hosts (running the
# imrelp listener on 2514, introduced upstream in commit f991251ab4) and
# older hosts that only run imudp on 514.
#
# Implementation notes (validated on rsyslog 8.2504.0):
#   * action.resumeRetryCount="0" means *no retries*: the omrelp action
#     enters the suspended state on first failure, so the imudp fallback
#     fires immediately. (resumeRetryCount="-1" means retry forever and
#     would prevent fallback; resumeRetryCount=N>0 only delays it.)
#   * The omrelp action MUST NOT have its own queue (queue.type=...).
#     Per-action queues split submit and send across threads, so the
#     suspended flag is set asynchronously after the rule engine has
#     already evaluated execOnlyWhenPreviousIsSuspended on the next
#     action; UDP fallback then never fires and messages are buffered
#     indefinitely or dropped.
#   * resumeInterval governs how often rsyslog probes whether RELP is back;
#     a host upgrade old->new is picked up automatically within this many
#     seconds, with no duplicate messages during the transition.
#
# Keep this file in sync across docker-gnmi-sidecar, docker-sonic-gnmi,
# and docker-gnmi-watchdog. omrelp requires rsyslog-relp, which is
# installed in docker-base-trixie since commit f991251ab4.

#################
#### MODULES ####
#################

$ModLoad imuxsock # provides support for local system logging
module(load="omrelp")

#
# Set a rate limit on messages from the container
#
$SystemLogRateLimitInterval 300
$SystemLogRateLimitBurst 20000

#$ModLoad imklog  # provides kernel logging support
#$ModLoad immark  # provides --MARK-- message capability

# provides UDP syslog reception
#$ModLoad imudp
#$UDPServerRun 514

# provides TCP syslog reception
#$ModLoad imtcp
#$InputTCPServerRun 514


###########################
#### GLOBAL DIRECTIVES ####
###########################

set $.CONTAINER_NAME=getenv("CONTAINER_NAME");

# Set remote syslog server: prefer RELP on 2514, fall back to UDP on 514
# while RELP is suspended (i.e. host has no imrelp listener or it is
# unreachable). See header comment for rationale on the specific options.
template (name="ForwardFormatInContainer" type="string" string="<%PRI%>%TIMESTAMP:::date-rfc3339% %HOSTNAME% %$.CONTAINER_NAME%#%syslogtag%%msg:::sp-if-no-1st-sp%%msg%")

*.* action(type="omrelp"
           target=`echo $SYSLOG_TARGET_IP`
           port="2514"
           action.resumeRetryCount="0"
           action.resumeInterval="30"
           Template="ForwardFormatInContainer")

*.* action(type="omfwd"
           target=`echo $SYSLOG_TARGET_IP`
           port="514"
           protocol="udp"
           action.execOnlyWhenPreviousIsSuspended="on"
           Template="ForwardFormatInContainer")

#
# Use traditional timestamp format.
# To enable high precision timestamps, comment out the following line.
#
#$ActionFileDefaultTemplate RSYSLOG_TraditionalFileFormat

# Define a custom template
$template SONiCFileFormat,"%TIMESTAMP%.%timestamp:::date-subseconds% %HOSTNAME% %syslogseverity-text:::uppercase% %$.CONTAINER_NAME%#%syslogtag%%msg:::sp-if-no-1st-sp%%msg:::drop-last-lf%\n"
$ActionFileDefaultTemplate SONiCFileFormat

#
# Set the default permissions for all log files.
#
$FileOwner root
$FileGroup adm
$FileCreateMode 0640
$DirCreateMode 0755
$Umask 0022

#
# Where to place spool and state files
#
$WorkDirectory /var/spool/rsyslog

#
# Include all config files in /etc/rsyslog.d/
#
$IncludeConfig /etc/rsyslog.d/*.conf

#
# Suppress duplicate messages and report "message repeated n times"
#
$RepeatedMsgReduction on

###############
#### RULES ####
###############
