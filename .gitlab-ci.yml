  tags:
    - regress_chassis10
  variables:
    DELAY_START: 200
    EXTRA_RUN_TEST_ARGS: --suite masic
  only:
    variables:
      - $REGRESS_T2_CHASSIS10

regress:t2:chassis11:
  extends: .regress
  tags:
    - regress_chassis11
  variables:
    DELAY_START: 300
    EXTRA_RUN_TEST_ARGS: --suite masic
  only:
