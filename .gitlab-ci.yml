.post:
  stage: post
  tags:
    - post
  script: |
    . .ci-env
    if [ "$skip_build" = "1" ] && [ -z "${NO_SKIP_BUILD}" ]; then
      echo "skipping post"
    else
        # with all express passed, we post images and update the symlink latest
      mkdir -p /var/www/html/${PLUTO_COMMIT_DIR}
      for f in `ls target/sonic-*.bin` ; do \
        cp -a $f /var/www/html/${PLUTO_COMMIT_DIR}/ ; done
      if [ -e target/docker-syncd-brcm-dnx-rpc.gz ] ; then \
        cp -a target/docker-syncd-brcm-dnx-rpc.gz /var/www/html/${PLUTO_COMMIT_DIR}/ ; fi
      if [ -e version.txt ] ; then cp -a version.txt /var/www/html/${PLUTO_COMMIT_DIR}/ ; fi
      eval ${BUILD_REASON}
      echo "sonic_commitid=${CI_COMMIT_SHORT_SHA}" > /var/www/html/${PLUTO_COMMIT_DIR}/build-info.txt
      if [ "${SRL_NDK_JOBID}" != "" ] ; then
         echo "srl_ndk_job_url=https://gitlabsr.nuq.ion.nokia.net/sr/srlinux/-/jobs/${SRL_NDK_JOBID}" >> /var/www/html/${PLUTO_COMMIT_DIR}/build-info.txt
      fi
      # make latest link and remove anything older than a week
      cd /var/www/html/${PLUTO_BRANCH_DIR} && \
        rm -f latest && ln -sf ${CI_PIPELINE_ID} latest && \
        find . -maxdepth 1 -type d -ctime +7 -exec rm -fr {} \+
    fi

post:ixre:
  extends: .post
  needs:
    - build:broadcom

post:docker-syncd-brcm-rpc:
  extends: .post
  needs:
    - build:docker-syncd-brcm-rpc

post:armhf:
  extends: .post
  rules:
    - if: $BUILD_REASON !~ /SRL_NDK_JOBID/
  needs:
    - build:marvell-armhf
