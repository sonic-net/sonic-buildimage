# This file is a template, and might need editing before it works on your project.
# see https://docs.gitlab.com/ce/ci/yaml/README.html for all available options

variables:
  GIT_CLEAN_FLAGS: "-ffxd -e fsroot"
  #CI_DEBUG_TRACE: "true"
  HOME: "${CI_PROJECT_DIR}"
  ENABLE_PRINT_BUILD_TIME: verbose
  SONIC_CONFIG_MAKE_JOBS: 16
  NOJESSIE: 1
  NOSTRETCH: 1
  BUILD_NUMBER: "${CI_PIPELINE_ID}-${CI_COMMIT_BRANCH}"
  PLUTO_PARENT_BRANCH: master
  PLUTO_BRANCH_DIR: files/sonic/build/${CI_COMMIT_BRANCH}
  PLUTO_COMMIT_DIR: files/sonic/build/${CI_COMMIT_BRANCH}/${CI_PIPELINE_ID}
  PLUTO_POSTED_LATEST: files/sonic/build/${PLUTO_PARENT_BRANCH}/latest

before_script:
  - sudo rm -fr fsroot
  - rm -f .gitconfig && touch $HOME/.gitconfig
  - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlabsr.nuq.ion.nokia.net/".insteadOf "git@gitlabsr.nuq.ion.nokia.net:"
  # commit title with things in brackets e.g. "[skip build] some change" will create variables, e.g. skip_build=1
  - touch .ci-env
  - echo $CI_COMMIT_TITLE | sed 's,[ -/:],_,g' | awk -v FS='(\\[|\\])' '{if($2!="")print $2"=1"}' > .ci-env

stages:
  - build
  - test
  - post
  - deploy

# Build with option to display build time for each component and sorted list of longest build times
build:broadcom:
  stage: build
  script: |
    ./.gitlab-ci-submodule-init.sh
    . .ci-env
    # schedules can set NO_SKIP_BUILD to force a build to happen
    if [ "$skip_build" = "1" ] && [ -z "${NO_SKIP_BUILD}" ]; then
      # skip build and use the latest
      mkdir -p target
      curl -o target/sonic-broadcom-dnx.bin http://sonic-pluto.ipd.us.alcatel-lucent.com/${PLUTO_POSTED_LATEST}/sonic-broadcom-dnx.bin
    else
      ./build.sh
    fi
    ./.gitlab-mk-version.sh > version.txt
  artifacts:
    name: "$CI_COMMIT_REF_NAME"
    paths:
      - target/sonic-broadcom-dnx.bin
      - version.txt
    expire_in: 1 week

express:hw:ixre:
  stage: test
  tags:
    - regress_chassis9
  needs:
    - build:broadcom
  only:
    variables:
      - $EXPRESS_HW || $CI_PIPELINE_SOURCE == "push"
  script:
    - ./.gitlab-ci-submodule-init.sh
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - echo "runner=${CI_RUNNER_DESCRIPTION} tags=\"${CI_RUNNER_TAGS}\" commit=${CI_COMMIT_SHORT_SHA}"
    - ./run_test.sh -i target/sonic-broadcom-dnx.bin -g https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlabsr.nuq.ion.nokia.net -r ${CI_RUNNER_DESCRIPTION} --upgrade --configure --test --no_cleanup
  artifacts:
    name: "$CI_COMMIT_REF_NAME"
    when: always
    paths:
      - output_files/
    expire_in: 1 month

regress:t2:chassis8:
  stage: test
  tags:
    - sonic_eagle_express
  only:
    variables:
      - $REGRESS_T2_CHASSIS8
  needs:
    - build:broadcom
  script:
    - ./.gitlab-ci-submodule-init.sh
    - sleep 600
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - echo "runner=${CI_RUNNER_DESCRIPTION} tags=\"${CI_RUNNER_TAGS}\" commit=${CI_COMMIT_SHORT_SHA}"
    - ./run_test.sh -i target/sonic-broadcom-dnx.bin -g https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlabsr.nuq.ion.nokia.net -r ${CI_RUNNER_DESCRIPTION} --upgrade --configure --test --run_in_order false --topology t2 --suite masic --no_cleanup --post_results > ${CI_PROJECT_DIR}/run.log
  artifacts:
    name: "$CI_COMMIT_REF_NAME"
    when: always
    paths:
      - output_files/
      - ${CI_PROJECT_DIR}/run.log      
    expire_in: 1 month

    
