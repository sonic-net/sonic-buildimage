# This file is a template, and might need editing before it works on your project.
# see https://docs.gitlab.com/ce/ci/yaml/README.html for all available options

variables:
  GIT_CLEAN_FLAGS: "-ffxd -e fsroot"
  #CI_DEBUG_TRACE: "true"
  HOME: "${CI_PROJECT_DIR}"
  SONIC_CONFIG_MAKE_JOBS: 16
  NOJESSIE: 1
  NOSTRETCH: 1
  BUILD_NUMBER: "${CI_PIPELINE_ID}-${CI_COMMIT_BRANCH}"
  PLUTO_PARENT_BRANCH: master
  PLUTO_BRANCH_DIR: files/sonic/build/${CI_COMMIT_BRANCH}
  PLUTO_COMMIT_DIR: files/sonic/build/${CI_COMMIT_BRANCH}/${CI_PIPELINE_ID}
  PLUTO_POSTED_LATEST: files/sonic/build/${PLUTO_PARENT_BRANCH}/latest

before_script: |
  sudo rm -fr fsroot
  rm -f .gitconfig && touch $HOME/.gitconfig
  git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlabsr.nuq.ion.nokia.net/".insteadOf "git@gitlabsr.nuq.ion.nokia.net:"
  # commit title with things in brackets e.g. "[skip build] some change" will create variables, e.g. skip_build=1
  touch .ci-env
  echo $CI_COMMIT_TITLE | sed 's,[ -/:],_,g' | awk -v FS='(\\[|\\])' '{if($2!="")print $2"=1"}' > .ci-env
  ./.gitlab-ci-submodule-init.sh
  # always use latest of these submodules
  pushd altos && git fetch && git reset --hard origin/master && popd
  pushd src/sonic-mgmt && git fetch && git reset --hard origin/nokia-dev && popd

stages:
  - build
  - test
  - post
  - deploy

# Build with option to display build time for each component and sorted list of longest build times
build:broadcom:
  stage: build
  script: |
    ./.gitlab-ci-submodule-init.sh
    . .ci-env
    # schedules can set NO_SKIP_BUILD to force a build to happen
    if [ "$skip_build" = "1" ] && [ -z "${NO_SKIP_BUILD}" ]; then
      # skip build and use the latest
      mkdir -p target
      curl -o target/sonic-broadcom-dnx.bin http://sonic-pluto.ipd.us.alcatel-lucent.com/${PLUTO_POSTED_LATEST}/sonic-broadcom-dnx.bin
    else
      ./build.sh
    fi
    ./.gitlab-mk-version.sh > version.txt
  artifacts:
    name: "$CI_COMMIT_REF_NAME"
    paths:
      - target/sonic-broadcom-dnx.bin
      - version.txt
    expire_in: 1 week

build:docker-syncd-brcm-rpc:
  stage: build
  script: |
    ./.gitlab-ci-submodule-init.sh
    . .ci-env
    if [ "$skip_build" = "1" ] && [ -z "${NO_SKIP_BUILD}" ]; then
      # skip build and use the latest
      mkdir -p target
      curl -o target/docker-syncd-brcm-dnx-rpc.gz http://sonic-pluto.ipd.us.alcatel-lucent.com/${PLUTO_POSTED_LATEST}/docker-syncd-brcm-dnx-rpc.gz
    else
      ./build-syncd-rpc.sh
    fi
  artifacts:
    name: "$CI_COMMIT_REF_NAME"
    paths:
      - target/docker-syncd-brcm*rpc.gz
    expire_in: 1 week

build:marvell-armhf:
  stage: build
  rules:
    - if: $BUILD_REASON !~ /SRL_NDK_JOBID/
  tags:
    - armhf
  script: |
    ./.gitlab-ci-submodule-init.sh
    . .ci-env
    # schedules can set NO_SKIP_BUILD to force a build to happen
    if [ "$skip_build" = "1" ] && [ -z "${NO_SKIP_BUILD}" ]; then
      # skip build and use the latest
      mkdir -p target
      curl -o target/sonic-marvell-armhf.bin http://sonic-pluto.ipd.us.alcatel-lucent.com/${PLUTO_POSTED_LATEST}/sonic-marvell-armhf.bin
    else
      make init && make configure PLATFORM=marvell-armhf PLATFORM_ARCH=armhf
      make SONIC_BUILD_JOBS=2 target/sonic-marvell-armhf.bin || \
      make SONIC_BUILD_JOBS=1 target/sonic-marvell-armhf.bin
    fi
  artifacts:
    name: "$CI_COMMIT_REF_NAME"
    paths:
      - target/sonic-marvell-armhf.bin
    expire_in: 1 week

express:hw:ixre:
  stage: test
  tags:
    - regress_chassis7
  needs:
    - build:broadcom
  only:
    variables:
      - $EXPRESS_HW || $CI_PIPELINE_SOURCE == "push"
  script: |
    docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    echo "runner=${CI_RUNNER_DESCRIPTION} tags=\"${CI_RUNNER_TAGS}\" commit=${CI_COMMIT_SHORT_SHA}"
    ./run_test.sh -i target/sonic-broadcom-dnx.bin \
      -g https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlabsr.nuq.ion.nokia.net \
      -r ${CI_RUNNER_DESCRIPTION} --upgrade --configure --test --no_cleanup
  artifacts:
    name: "$CI_COMMIT_REF_NAME"
    when: always
    paths:
      - output_files/
    expire_in: 1 month

express:hw:armhf:
  stage: test
  # tags:
  #   - express_<tbd>
  rules:
    - if: $BUILD_REASON !~ /SRL_NDK_JOBID/
  needs:
    - build:marvell-armhf
  script: |
    docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    echo "runner=${CI_RUNNER_DESCRIPTION} tags=\"${CI_RUNNER_TAGS}\" commit=${CI_COMMIT_SHORT_SHA}"
    ls -la target/sonic-marvell-armhf.bin
    # ./run_test.sh -i target/sonic-marvell-armhf.bin \
    #   -g https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlabsr.nuq.ion.nokia.net \
    #   -r ${CI_RUNNER_DESCRIPTION} --upgrade --configure --test --no_cleanup
  artifacts:
    name: "$CI_COMMIT_REF_NAME"
    when: always
    paths:
      - output_files/
    expire_in: 1 month

.regress:
  stage: test
  needs:
    - build:broadcom
  script: |
    if [ -n "${DELAY_START}" ]; then sleep ${DELAY_START}; fi
    docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    echo "runner=${CI_RUNNER_DESCRIPTION} tags=\"${CI_RUNNER_TAGS}\" commit=${CI_COMMIT_SHORT_SHA}"
    ./run_test.sh -i target/sonic-broadcom-dnx.bin \
      -g https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlabsr.nuq.ion.nokia.net \
      -r ${CI_RUNNER_DESCRIPTION} --upgrade --configure --test \
      --run_in_order false --topology t2 ${EXTRA_RUN_TEST_ARGS} \
      --no_cleanup --post_results > ${CI_PROJECT_DIR}/run.log
  artifacts:
    name: "$CI_COMMIT_REF_NAME"
    when: always
    paths:
      - output_files/
      - ${CI_PROJECT_DIR}/run.log      
    expire_in: 1 month

