.post:
  stage: post
  only:
    - branches
  tags:
    - post
  before_script:
    - !reference [.global_script, git_config]
  script: |
    . .ci-env
    case "$LEAN" in true) echo LEAN ; exit 0 ; esac
    if [ "$skip_build" = "1" ] && [ -z "${NO_SKIP_BUILD}" ]; then
      exit 0
    fi
    # with all express passed, we post images and update the symlink latest
    mkdir -p /var/www/html/${PLUTO_COMMIT_DIR}
    for f in `ls target/sonic-*.bin` ; do \
      cp -a --no-preserve=mode $f /var/www/html/${PLUTO_COMMIT_DIR}/ ; done
    for f in `ls target/docker-syncd-*rpc.gz` ; do \
      cp -a --no-preserve=mode $f /var/www/html/${PLUTO_COMMIT_DIR}/ ; done
    echo "sonic_commitid=${CI_COMMIT_SHORT_SHA}" > /var/www/html/${PLUTO_COMMIT_DIR}/build-info.txt
    # make latest link and remove anything older than a week
    cd /var/www/html/${PLUTO_BRANCH_DIR} && \
      rm -f latest && ln -sf ${CI_PIPELINE_ID} latest && \
      find . -maxdepth 1 -type d -ctime +7 -exec rm -fr {} \+

