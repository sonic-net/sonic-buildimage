post:
  stage: post
  tags:
    - post
  # only:
  #   refs:
  #     - nokia-master
  needs:
    - build:broadcom
  script:
    - . .ci-env
    - if [ "$skip_build" = "1" ] && [ -z "${NO_SKIP_BUILD}" ]; then
    -   echo "skipping post"
    - else
        # with all express passed, we post images and update the symlink latest
    -   mkdir -p /var/www/html/${PLUTO_COMMIT_DIR}
    -   cp -a target/sonic-broadcom-dnx.bin /var/www/html/${PLUTO_COMMIT_DIR}/
    -   if [ -e target/sonic-vs.img.gz ]; then
    -     cp -a target/sonic-vs.img.gz /var/www/html/${PLUTO_COMMIT_DIR}/
    -   fi
    -   cp -a version.txt /var/www/html/${PLUTO_COMMIT_DIR}/
    -   eval ${BUILD_REASON}
    -   echo "sonic_commitid=${CI_COMMIT_SHORT_SHA}" > /var/www/html/${PLUTO_COMMIT_DIR}/build-info.txt
    -   if [ "${SRL_NDK_JOBID}" != "" ] ; then
    -      echo "srl_ndk_job_url=https://gitlabsr.nuq.ion.nokia.net/sr/srlinux/-/jobs/${SRL_NDK_JOBID}" >> /var/www/html/${PLUTO_COMMIT_DIR}/build-info.txt
    -   fi
    -   cd /var/www/html/${PLUTO_BRANCH_DIR} && rm -f latest && ln -sf ${CI_PIPELINE_ID} latest
    - fi
