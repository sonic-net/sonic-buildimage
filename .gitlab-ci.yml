# This file is a template, and might need editing before it works on your project.
# see https://docs.gitlab.com/ce/ci/yaml/README.html for all available options

variables:
  GIT_CLEAN_FLAGS: "-ffxd -e fsroot"
  #CI_DEBUG_TRACE: "true"
  HOME: "${CI_PROJECT_DIR}"
  SONIC_CONFIG_MAKE_JOBS: 16
  NOJESSIE: 1
  NOSTRETCH: 1
  BUILD_NUMBER: "${CI_PIPELINE_ID}-${CI_COMMIT_BRANCH}"
  PLUTO_PARENT_BRANCH: nokia-master
  PLUTO_BRANCH_DIR: files/sonic/build/${CI_COMMIT_BRANCH}
  PLUTO_COMMIT_DIR: files/sonic/build/${CI_COMMIT_BRANCH}/${CI_PIPELINE_ID}
  PLUTO_POSTED_LATEST: files/sonic/build/${PLUTO_PARENT_BRANCH}/latest
  DOCKER_EXTRA_OPTS: '--registry-mirror=https://docker-registry-remote.artifactory-fpark1.int.net.nokia.com'
  LEAN: "false" # set true to stub out most jobs, useful for debugging this file

before_script: |
  sudo rm -fr fsroot
  rm -f .gitconfig && touch $HOME/.gitconfig
  git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlabsr.nuq.ion.nokia.net/".insteadOf "git@gitlabsr.nuq.ion.nokia.net:"
  # commit title with things in brackets e.g. "[skip build] some change" will create variables, e.g. skip_build=1
  touch .ci-env
  echo $CI_COMMIT_TITLE | sed 's,[ -/:],_,g' | awk -v FS='(\\[|\\])' '{if($2!="")print $2"=1"}' > .ci-env
  ./.gitlab-ci-submodule-init.sh
  # always use latest of these submodules
  pushd altos && git fetch && git reset --hard origin/master && popd
  pushd src/sonic-mgmt && git fetch && git reset --hard origin/nokia-dev && popd

stages:
  - configure
  - build
  - test
  - post

.configure:sonic:
  # one configure step to build all docker images used by subsequent build stage(s).
  # This is required to avoid conflicting docker image creation between 
  # build:broadcom and build:docker-syncd-brcm-rpc
  stage: configure
  only:
    - branches
  tags:
    - ${BUILD_ARCH}
  script: |
    ./.gitlab-ci-submodule-init.sh
    . .ci-env
    case "$LEAN" in true) echo LEAN ; exit 0 ; esac
    if [ "$skip_build" = "1" ] && [ -z "${NO_SKIP_BUILD}" ]; then
      exit 0
    fi
    ./build.sh

configure:sonic:x86_64:
  extends: .configure:sonic
  variables:
    BUILD_ARCH: x86_64

configure:sonic:armhf:
  extends: .configure:sonic
  variables:
    BUILD_ARCH: armhf

configure:sonic:aarch64:
  extends: .configure:sonic
  variables:
    BUILD_ARCH: aarch64

.build:sonic:
  stage: build
  only:
    - branches
  tags:
    - ${BUILD_ARCH}
  script: |
    ./.gitlab-ci-submodule-init.sh
    . .ci-env
    case "$LEAN" in true) echo LEAN ; exit 0 ; esac
     # schedules can set NO_SKIP_BUILD to force a build to happen
    if [ "$skip_build" = "1" ] && [ -z "${NO_SKIP_BUILD}" ]; then
      # skip build and use the latest
      mkdir -p target
      curl -o target/${TARGET_BIN} http://sonic-pluto.ipd.us.alcatel-lucent.com/${PLUTO_POSTED_LATEST}/${TARGET_BIN}
      exit 0
    fi
    ./build.sh
  artifacts:
    name: "$CI_COMMIT_REF_NAME"
    paths:
      - target/sonic-*.bin
    expire_in: 1 week

build:sonic:x86_64:
  extends: .build:sonic
  needs:
    - configure:sonic:x86_64
  variables: 
    BUILD_ARCH: x86_64
    TARGET_BIN: sonic-broadcom-dnx.bin

build:sonic:armhf:
  extends: .build:sonic
  needs:
    - configure:sonic:armhf
  variables:
    BUILD_ARCH: armhf
    TARGET_BIN: sonic-marvell-armhf.bin

build:sonic:aarch64:
  extends: .build:sonic
  needs:
    - configure:sonic:aarch64
  variables:
    BUILD_ARCH: aarch64
    TARGET_BIN: sonic-marvell-arm64.bin

.build:brcm-rpc:
  stage: build
  only:
    - branches
  tags:
    - ${BUILD_ARCH}
  script: |
    ./.gitlab-ci-submodule-init.sh
    . .ci-env
    case "$LEAN" in true) echo LEAN ; exit 0 ; esac
    if [ "$skip_build" = "1" ] && [ -z "${NO_SKIP_BUILD}" ]; then
      # skip build and use the latest
      mkdir -p target
      curl -o target/${TARGET_BIN} http://sonic-pluto.ipd.us.alcatel-lucent.com/${PLUTO_POSTED_LATEST}/${TARGET_BIN}
    else
      source nokia-env
      make init
      make configure PLATFORM=broadcom
      make SONIC_BUILD_JOBS=2 ENABLE_SYNCD_RPC=y target/${TARGET_BIN}
    fi
  artifacts:
    name: "$CI_COMMIT_REF_NAME"
    paths:
      - target/${TARGET_BIN}
    expire_in: 1 week

build:brcm-rpc:x86_64:
  extends: .build:brcm-rpc
  needs:
    - configure:sonic:x86_64
  variables:
    BUILD_ARCH: x86_64
    TARGET_BIN: docker-syncd-brcm-rpc.gz

build:brcm-rpc-dnx:x86_64:
  extends: .build:brcm-rpc
  needs:
    - configure:sonic:x86_64
  variables:
    BUILD_ARCH: x86_64
    TARGET_BIN: docker-syncd-brcm-dnx-rpc.gz

express:chassis7:
  stage: test
  only:
    - branches
  tags:
    - regress_chassis7
  needs:
    - build:sonic:x86_64
  when: manual
  script: |
    docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    case "$LEAN" in true) echo LEAN ; exit 0 ; esac
    echo "runner=${CI_RUNNER_DESCRIPTION} tags=\"${CI_RUNNER_TAGS}\" commit=${CI_COMMIT_SHORT_SHA}"
    ./run_test.sh -i target/sonic-broadcom-dnx.bin \
      -g https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlabsr.nuq.ion.nokia.net \
      -r ${CI_RUNNER_DESCRIPTION} --upgrade --configure --test --no_cleanup
  allow_failure: true
  artifacts:
    name: "$CI_COMMIT_REF_NAME"
    when: always
    paths:
      - output_files/
    expire_in: 1 month

.regress:
  stage: test
  needs:
    - build:sonic:x86_64
  script: |
    if [ -n "${DELAY_START}" ]; then sleep ${DELAY_START}; fi
    docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    echo "runner=${CI_RUNNER_DESCRIPTION} tags=\"${CI_RUNNER_TAGS}\" commit=${CI_COMMIT_SHORT_SHA}"
    ./run_test.sh -i target/sonic-broadcom-dnx.bin \
      -g https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlabsr.nuq.ion.nokia.net \
      -r ${CI_RUNNER_DESCRIPTION} --upgrade --configure --test \
      --run_in_order false --topology t2 ${EXTRA_RUN_TEST_ARGS} \
      --no_cleanup --post_results > ${CI_PROJECT_DIR}/run.log
  allow_failure: true
  artifacts:
    name: "$CI_COMMIT_REF_NAME"
    when: always
    paths:
      - output_files/
      - ${CI_PROJECT_DIR}/run.log
    expire_in: 1 month

regress:t2:chassis8:
  extends: .regress
  tags:
    - regress_chassis8
  variables:
    DELAY_START: 0
    EXTRA_RUN_TEST_ARGS: --suite masic
  only:
    variables:
      - $REGRESS_T2_CHASSIS8

regress:t2:chassis9:
