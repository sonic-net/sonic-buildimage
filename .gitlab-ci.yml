    TARGET_BIN: sonic-marvell-arm64.bin
    BUILD_SH_OPTIONS: " --features"
  after_script:
    - mv target/sonic-marvell-arm64.bin target/sonic-marvell-arm64-features.bin

.build:brcm-rpc:
  stage: build
  only:
    - branches
  tags:
    - ${BUILD_ARCH}
  before_script:
    - !reference [.global_script, git_config]
  script: |
    ./.gitlab-ci-submodule-init.sh
    . .ci-env
    case "$LEAN" in true) echo LEAN ; exit 0 ; esac
    if [ "$skip_build" = "1" ] && [ -z "${NO_SKIP_BUILD}" ]; then
      # skip build and use the latest
      mkdir -p target
      curl -o target/${TARGET_BIN} http://sonic-pluto.wfr.ion.nokia.net/${PLUTO_POSTED_LATEST}/${TARGET_BIN}
    else
      ./build.sh --rpc-${TARGET_SAI}
    fi
  artifacts:
    name: "$CI_COMMIT_REF_NAME"
    paths:
      - target/${TARGET_BIN}
    expire_in: 1 week

build:brcm-rpc:x86_64:
  extends: .build:brcm-rpc
  needs:
    - configure:sonic:x86_64
  variables:
    BUILD_ARCH: x86_64
    TARGET_BIN: docker-syncd-brcm-rpc.gz
    TARGET_SAI: xgs

build:brcm-rpc-dnx:x86_64:
  extends: .build:brcm-rpc
  needs:
    - configure:sonic:x86_64
  variables:
    BUILD_ARCH: x86_64
    TARGET_BIN: docker-syncd-brcm-dnx-rpc.gz
    TARGET_SAI: dnx

express:chassis7:
  stage: test
  only:
    - branches
  tags:
    - regress_chassis7
  needs:
    - build:sonic:x86_64
  when: manual
  before_script:
    - !reference [.global_script, git_config]
  script: |
    docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    echo "runner=${CI_RUNNER_DESCRIPTION} tags=\"${CI_RUNNER_TAGS}\" commit=${CI_COMMIT_SHORT_SHA}"
    case "$LEAN" in true) echo LEAN ; exit 0 ; esac
    pushd src/sonic-mgmt && git fetch && git reset --hard origin/${REGRESS_SONIC_MGMT_BRANCH} && popd
    ./run_test.sh -i target/sonic-broadcom-dnx.bin \
      -g https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlabsr.nuq.ion.nokia.net \
      -r ${CI_RUNNER_DESCRIPTION} --upgrade --configure --test --no_cleanup
  allow_failure: true
  artifacts:
    name: "$CI_COMMIT_REF_NAME"
    when: always
    paths:
      - output_files/
    expire_in: 1 week

.regress:
  stage: test
  before_script:
    - !reference [.global_script, git_config]
  script: |
    if [ -n "${DELAY_START}" ]; then sleep ${DELAY_START}; fi
    docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    echo "runner=${CI_RUNNER_DESCRIPTION} tags=\"${CI_RUNNER_TAGS}\" commit=${CI_COMMIT_SHORT_SHA}"
    case "$LEAN" in true) echo LEAN ; exit 0 ; esac
    pushd src/sonic-mgmt && git fetch && git reset --hard origin/${REGRESS_SONIC_MGMT_BRANCH} && popd
    ./run_test.sh -i ${RUN_IMAGE} \
      -g https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlabsr.nuq.ion.nokia.net \
      -r ${CI_RUNNER_DESCRIPTION} --upgrade --configure --test \
      --run_in_order false --topology ${REGRESS_TOPO} ${EXTRA_RUN_TEST_ARGS} \
      --no_cleanup --post_results > ${CI_PROJECT_DIR}/run.log
  allow_failure: true
  artifacts:
    name: "$CI_COMMIT_REF_NAME"
    when: always
    paths:
      - output_files/
      - ${CI_PROJECT_DIR}/run.log
    expire_in: 1 week

