# This file is a template, and might need editing before it works on your project.
# see https://docs.gitlab.com/ce/ci/yaml/README.html for all available options

variables:
  GIT_CLEAN_FLAGS: "-ffxd -e fsroot"
  #CI_DEBUG_TRACE: "true"
  HOME: "${CI_PROJECT_DIR}"
  SONIC_CONFIG_MAKE_JOBS: 16
  NOJESSIE: 1
  NOSTRETCH: 1
  BUILD_NUMBER: "${CI_PIPELINE_ID}-${CI_COMMIT_BRANCH}"
  REGRESS_SONIC_MGMT_BRANCH: nokia-dev
  REGRESS_TOPO: t2
  PLUTO_PARENT_BRANCH: nokia-master
  PLUTO_BRANCH_DIR: files/sonic/build/${CI_COMMIT_BRANCH}
  PLUTO_COMMIT_DIR: files/sonic/build/${CI_COMMIT_BRANCH}/${CI_PIPELINE_ID}
  PLUTO_POSTED_LATEST: files/sonic/build/${PLUTO_PARENT_BRANCH}/latest
  DOCKER_EXTRA_OPTS: '--registry-mirror=https://docker-registry-remote.artifactory-fpark1.int.net.nokia.com'
  LEAN: "false" # set true to stub out most jobs, useful for debugging this file

.global_script:
  git_config: |
    sudo rm -fr fsroot
    rm -f .gitconfig && touch $HOME/.gitconfig
    git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlabsr.nuq.ion.nokia.net/".insteadOf "git@gitlabsr.nuq.ion.nokia.net:"
    touch .ci-env
    echo $CI_COMMIT_TITLE | sed 's,[ -/:],_,g' | awk -v FS='(\\[|\\])' '{if($2!="")print $2"=1"}' > .ci-env
    ./.gitlab-ci-submodule-init.sh
    pushd altos && git fetch && git reset --hard origin/master && popd
    echo "PLUTO_POSTED_LATEST: ${PLUTO_POSTED_LATEST}"

stages:
  - configure
  - build
  - test
  - post

.configure:sonic:
  # one configure step to build all docker images used by subsequent build stage(s).
  # This is required to avoid conflicting docker image creation between 
  # build:broadcom and build:docker-syncd-brcm-rpc
  stage: configure
  only:
    - branches
  tags:
    - ${BUILD_ARCH}
  before_script:
    - !reference [.global_script, git_config]
  script: |
    ./.gitlab-ci-submodule-init.sh
    . .ci-env
    case "$LEAN" in true) echo LEAN ; exit 0 ; esac
    if [ "$skip_build" = "1" ] && [ -z "${NO_SKIP_BUILD}" ]; then
      exit 0
    fi
    ./build.sh

configure:sonic:x86_64:
  extends: .configure:sonic
  variables:
    BUILD_ARCH: x86_64

configure:sonic:armhf:
  extends: .configure:sonic
  variables:
    BUILD_ARCH: armhf

configure:sonic:aarch64:
  extends: .configure:sonic
  variables:
    BUILD_ARCH: aarch64

.build:sonic:
  stage: build
  only:
    - branches
  tags:
    - ${BUILD_ARCH}
  before_script:
    - !reference [.global_script, git_config]
  script: |
    ./.gitlab-ci-submodule-init.sh
    . .ci-env
    case "$LEAN" in true) echo LEAN ; exit 0 ; esac
     # schedules can set NO_SKIP_BUILD to force a build to happen
    if [ "$skip_build" = "1" ] && [ -z "${NO_SKIP_BUILD}" ]; then
      # skip build and use the latest
      mkdir -p target
      for f in ${TARGET_BIN}; do
        curl -o target/$f http://sonic-pluto.wfr.ion.nokia.net/${PLUTO_POSTED_LATEST}/$f
      done
      exit 0
    fi
    ./build.sh ${BUILD_SH_OPTIONS}
  artifacts:
    name: "$CI_COMMIT_REF_NAME"
    paths:
      - target/sonic-*.bin
    expire_in: 1 week

build:sonic-gbsyncd:x86_64:
  extends: .build:sonic
  needs:
    - configure:sonic:x86_64
  before_script:
    - !reference [.global_script, git_config]
    - sed -i 's,^$(LIBSAI_MILLENIOB)_URL =,$(LIBSAI_MILLENIOB)_URL ="http://sonic-pluto.wfr.ion.nokia.net/files/sonic/build/pai/pai-3.14/1003120/libsaimilleniob_$(LIBSAI_MILLENIOB_VERSION)~13_amd64.deb",'  platform/components/docker-gbsyncd-milleniob.mk
  variables:
    BUILD_ARCH: x86_64
    TARGET_BIN: sonic-broadcom.bin sonic-broadcom-dnx.bin
  after_script:
    - mv target/sonic-broadcom.bin target/sonic-broadcom-gbsyncd.bin
    - mv target/sonic-broadcom-dnx.bin target/sonic-broadcom-dnx-gbsyncd.bin

build:sonic:x86_64:
  extends: .build:sonic
  needs:
    - configure:sonic:x86_64
  variables: 
    BUILD_ARCH: x86_64
    TARGET_BIN: sonic-broadcom.bin sonic-broadcom-dnx.bin

build:sonic:armhf:
  extends: .build:sonic
  needs:
    - configure:sonic:armhf
  variables:
    BUILD_ARCH: armhf
    TARGET_BIN: sonic-marvell-armhf.bin

build:sonic:aarch64:
  extends: .build:sonic
  needs:
    - configure:sonic:aarch64
  variables:
    BUILD_ARCH: aarch64
    TARGET_BIN: sonic-marvell-arm64.bin

build:sonic:features:x86_64:
  extends: .build:sonic
  when: manual
  needs:
    - configure:sonic:x86_64
  variables:
    BUILD_ARCH: x86_64
    TARGET_BIN: sonic-broadcom.bin
    BUILD_SH_OPTIONS: " --features"
  after_script:
    - mv target/sonic-broadcom.bin target/sonic-broadcom-features.bin

build:sonic:features:aarch64:
  extends: .build:sonic
  when: manual
