parameters:
  - name: PLATFORM_NAME
    type: string
    values:
      - vs
      - generic
      - broadcom
      - broadcom-dbg
      - mellanox
      - barefoot
      - marvell-prestera-armhf
      - marvell-prestera-arm64
      - cisco-8000
      - cisco-8000-arm64
      - nvidia-bluefield
      - pensando
  - name: BRANCH_FOLDER
    default: 'default'

steps:
  - script: |
      set -ex
      logfiles=$(find target/ -name *.log)
      [ -z "$logfiles" ] && exit 0
      if grep -B 20 -e "Err:" -e "Failed to run the command with constraint, try to install with the original command" $logfiles; then
        exit 1
      fi
      exit 0
    continueOnError: true
    displayName: Log Scan
  - script: |
      set -ex
      if [ -e target/daemon.log ];then
        cat target/daemon.log
        exit 1
      fi
      exit 0
    displayName: Detect docker hang
    continueOnError: true
  - ${{ if eq(variables['System.DefinitionId'], 372481) }}:
    # Only enable BinSkim on VS platform, because they share same way of compiling
    # Only enable on VS platform can maximum reduce the affection to current build logic
    - ${{ if eq(parameters.PLATFORM_NAME, 'vs') }}:
      - task: BinSkim@4
        inputs:
          InputType: 'Basic'
          Function: 'analyze'
          TargetPattern: 'guardianGlob'
          AnalyzeTargetGlob: 'target/**/*.bin;'
          AnalyzeVerbose: true
        continueOnError: true
    - task: CodeQL3000Finalize@0
    - script: |
        branch=$(echo "$(Build.SourceBranch)" | sed -e 's#refs/heads/##' -e 's#refs/tags/##')
        folder_path="/azmirrors/pipelines/Networking-acs-buildimage-Official/$branch/${{ parameters.PLATFORM_NAME }}"
        echo "$folder_path"
        echo "##vso[task.setvariable variable=BRANCH;]$branch"
        echo "##vso[task.setvariable variable=FOLDER_PATH;]$folder_path"
        set -ex
        touch target/sonic-installers
        SONIC_VERSION=$(cat target/sonic.version)
        for image in `ls target | grep -E "\.(swi|bin|raw|deb)$"`; do
          version_image=$(echo $image | sed -E "s/(-dbg\.\w+|\.\w+)$/-$SONIC_VERSION\1/")
          echo "$image,$version_image" >> target/sonic-installers
        done
      displayName: "Copy installers"
    - task: ManifestGeneratorTask@0
      condition: ne(variables.SKIP_MG, 'y')
      timeoutInMinutes: 60
      continueOnError: true
      displayName: "Manifest Generator"
      inputs:
        BuildDropPath: '$(System.DefaultWorkingDirectory)/target/'
        ManifestDirPath: 'target/'
        BuildComponentPath: $(System.DefaultWorkingDirectory)/src/
    - task: AzureCLI@2
      displayName: Publish to Azure Storage by task
      inputs:
        azureSubscription: 'sonic-sub-prod'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az account show
          az storage blob upload-batch --auth-mode login \
            -d https://sonicstorageinternal.blob.core.windows.net/images/ \
            -s target \
            --destination-path pipelines/Networking-acs-buildimage-Official/$(BRANCH)/${{ parameters.PLATFORM_NAME }}/$(Build.BuildId)/target
    - task: SSH@0
      displayName: "Make soft links for trusty8"
      retryCountOnTaskFailure: 5
      inputs:
        sshEndpoint: 'jumpbox'
        failOnStdErr: false
        runOptions: 'inline'
        readyTimeout: '20000'
        inline: |
          echo "Make link for pipelines/Networking-acs-buildimage-Official/$(Build.SourceBranchName)"
          [ -e $(FOLDER_PATH)/latest_build ] && mv $(FOLDER_PATH)/latest_build $(FOLDER_PATH)/prev_build
          echo $(Build.BuildId) > $(FOLDER_PATH)/latest_build
          LINK_FOLDERNAMES=.
          [[ "$(SONIC_VERSION)" == "$(LATEST_TAG)" ]] && LINK_FOLDERNAMES=". tagged"
          for link_foldername in $LINK_FOLDERNAMES; do
            LATEST_VERSION=
            PREVIOUS_VERSION=
            latest_path=$(FOLDER_PATH)/$(Build.BuildId)
            BRANCH_NAME=$(BRANCH)
            [[ "${{ parameters.BRANCH_FOLDER }}" != 'default' ]] && BRANCH_NAME=${{ parameters.BRANCH_FOLDER }}
            link_path=/data/pipelines/Networking-acs-buildimage-Official/${{ parameters.PLATFORM_NAME }}/$BRANCH_NAME/$link_foldername
            [ -e $link_path/latest/target/sonic.version ] && LATEST_VERSION=$(cat $link_path/latest/target/sonic.version)
            mkdir -p $link_path
   
            # Skip the change if the latest version is existed
            if [[ "$LATEST_VERSION" == "$(SONIC_VERSION)" ]]; then
              echo "Skipped to update the symbol links for version $LATEST_VERSION in $link_path"
              continue
            fi
   
            # Make soft links for latest and prev
            prev_link_path=$(realpath $link_path/latest)
            # If the latest version in the storage account is the same as the current build version, not update the prev link
            if [ -e $prev_link_path ] && [ "$LATEST_VERSION" != "$(SONIC_VERSION)" ]; then
              [ -e $link_path/prev/target/sonic.version ] && PREVIOUS_VERSION=$(cat $link_path/prev/target/sonic.version)
              ln -nsf "$prev_link_path" "$link_path/prev"
            fi
   
            ln -nsf "$latest_path" "$link_path/latest"
   
            # Make soft links for installers
            installers_path=$link_path/installers
            mkdir -p $installers_path
            ln -sf $latest_path/target/sonic.version $installers_path/sonic.version
            for installer in `cat $latest_path/target/sonic-installers`; do
              image=$(echo $installer | cut -d, -f1)
              version_image=$(echo $installer | cut -d, -f2)
              ln -sf $latest_path/target/$image $installers_path/$image
              ln -sf $latest_path/target/$image $link_path/$version_image
              ln -sf latest/target/$image $link_path/$image
              ln -sf prev/target/$image $link_path/$image.PREV.1
            done
   
            # Remove the old soft links
            if [ "$link_foldername" != "tagged" ]; then
              echo "Remove the old symbol links in $link_foldername"
              if [ -n "$PREVIOUS_VERSION" ]; then
                rm -f $link_path/*"$PREVIOUS_VERSION"*
              fi
            else
              echo "Skipped to remove the old symbol links in $link_foldername"
            fi
          done
    - script: |
        SONIC_VERSION=$(cat target/sonic.version)
        PORT=443
        # QoS test needs syncd/rcp dockers, kube SONiC need config-engine as docker base.
        DOCKERS=$(ls target/docker-*.gz | grep -i -e rpc -e syncd -e config-engine)
        BRANCH=$(Build.SourceBranchName)
        arch=$(cat .arch)
        if echo "$arch" | grep arm; then
          LABELS="$BRANCH-$arch $SONIC_VERSION-$arch"
          [[ "$BRANCH" == "internal" ]] && LABELS="$LABELS latest-$arch"
        else
          LABELS="$BRANCH $SONIC_VERSION"
          [[ "$BRANCH" == "internal" ]] && LABELS="$LABELS latest"
        fi
        for f in $DOCKERS; do
          echo $f
          ./push_docker.sh $f $(REGISTRY_SERVER_INTERNAL) $PORT $(REGISTRY_USERNAME) "$REGISTRY_PASSWD" "$LABELS"
        done
      env:
        REGISTRY_PASSWD: $(REGISTRY_PASSWD)
        HL_REGISTRY_PASSWD: $(HL_REGISTRY_PASSWD)
      displayName: "Publish to Docker Registry"
  - script: |
      mv target $(Build.ArtifactStagingDirectory)/
    displayName: Move target to ArtifactsDir
    condition: always()
  - task: PublishPipelineArtifact@1
    continueOnError: true
    condition: always()
    inputs:
      targetPath: $(Build.ArtifactStagingDirectory)
      artifact: 'sonic-buildimage.${{ parameters.PLATFORM_NAME }}'
  - template: /.azure-pipelines/cleanup.yml

