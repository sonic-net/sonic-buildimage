trigger: none
pr:
  branches:
    include:
      - internal
      - internal-202???
  paths:
    exclude:
      - .github
resources:
  repositories:
  - repository: acs-buildimage
    type: git
    name: One/Networking-acs-buildimage
    ref: internal

name: $(TeamProject)_$(Build.DefinitionName)_$(SourceBranchName)_$(Date:yyyyMMdd)$(Rev:.r)

variables:
  - template: .azure-pipelines/template-variables.yml@acs-buildimage
  - template: .pipelines/azure-pipelines-repd-build-variables.yml@acs-buildimage

stages:
- stage: Build
  pool: sonic-image-builder-1ES
  variables:
    CACHE_MODE: rcache
    ${{ if eq(variables['Build.SourceBranchName'], '202012') }}:
      VERSION_CONTROL_OPTIONS: 'SONIC_VERSION_CONTROL_COMPONENTS=deb,py2,py3,web,git,docker'
  jobs:
  - template: .azure-pipelines/azure-pipelines-build.yml@acs-buildimage
    parameters:
      buildOptions: 'USERNAME=admin SONIC_BUILD_JOBS=$(nproc) ${{ variables.VERSION_CONTROL_OPTIONS }}'
      jobGroups:
      - name: vs
      - name: broadcom
        variables:
          swi_image: yes
      - name: mellanox
      preSteps:
        - template: .pipelines/prepare_agent.yml@acs-buildimage

- stage: Test
  dependsOn: Build
  condition: and(succeeded(), in(dependencies.Build.result, 'Succeeded', 'SucceededWithIssues'))
  variables:
    - group: SONiC-Testbed-Tools
    - name: inventory
      value: veos_vtb
    - name: testbed_file
      value: vtestbed.yaml

  # For every test job:
  # continueOnError: false means it's a required test job and will block merge if it fails
  # continueOnError: true means it's an optional test job and will not block merge even though it fails(unless a required test job depends on its result)

  jobs:
  - job:
    displayName: "vstest"
    timeoutInMinutes: 60
    steps:
      - template: .azure-pipelines/cleanup.yml@acs-buildimage
      - checkout: self
        clean: true
        submodules: recursive
        displayName: 'Checkout code'

      - script: |
          sudo rm -rf ../target
          sudo rm -rf ../*.deb
        displayName: "Cleanup"

      - task: DownloadPipelineArtifact@2
        inputs:
          source: specific
          project: build
          pipeline: 9
          artifact: sonic-swss-common.amd64.ubuntu20_04
          runVersion: 'latestFromBranch'
          runBranch: 'refs/heads/master'
        displayName: "Download sonic swss common deb packages"

      - task: DownloadPipelineArtifact@2
        inputs:
          artifact: sonic-buildimage.vs
        displayName: "Download sonic-buildimage.vs artifact"

      - script: |
          set -x
          sudo apt-get update
          sudo apt-get install libyang0.16 -y
          sudo dpkg -i --force-confask,confnew ../libswsscommon_1.0.0_amd64.deb
          sudo dpkg -i ../python3-swsscommon_1.0.0_amd64.deb
          sudo docker load -i ../target/docker-sonic-vs.gz
          docker tag docker-sonic-vs:latest docker-sonic-vs:$(Build.BuildId)
          username=$(id -un)
          
          trap "docker ps; docker images; ip netns list; \
                docker rmi docker-sonic-vs:$(Build.BuildId); \
                ip netns list | grep -E [-]srv[0-9]+ | awk '{print $1}' | xargs -I {} sudo ip netns delete {}; \
                sudo chown -R ${username}.${username} .; \
                sudo chown -R ${username}.${username} $(System.DefaultWorkingDirectory)" EXIT
          pushd platform/vs/tests
          sudo py.test -v --junitxml=tr.xml --imgname=docker-sonic-vs:$(Build.BuildId)
        displayName: "Run vs tests"

      - task: PublishTestResults@2
        inputs:
          testResultsFiles: '**/tr.xml'
          testRunTitle: vstest

  - job: t0_testbedv2
    pool:
      vmImage: 'ubuntu-20.04'
    displayName: "kvmtest-t0 by TestbedV2"
    timeoutInMinutes: 240
    condition: succeeded()
    continueOnError: false
    steps:
      - template: ../.azure-pipelines/run-test-scheduler-template.yml
        parameters:
          TOPOLOGY: t0
          MIN_WORKER: $(T0_INSTANCE_NUM)
          MAX_WORKER: $(T0_INSTANCE_NUM)

  - job: t0_2vlans_testbedv2
    pool:
      vmImage: 'ubuntu-20.04'
    displayName: "kvmtest-t0-2vlans by TestbedV2"
    timeoutInMinutes: 240
    condition: succeeded()
    continueOnError: false
    steps:
      - template: ../.azure-pipelines/run-test-scheduler-template.yml
        parameters:
          TOPOLOGY: t0
          TEST_SET: t0-2vlans
          MIN_WORKER: $(T0_2VLANS_INSTANCE_NUM)
          MAX_WORKER: $(T0_2VLANS_INSTANCE_NUM)
          DEPLOY_MG_EXTRA_PARAMS: "-e vlan_config=two_vlan_a"

  - job: t1_lag_testbedv2
    pool:
      vmImage: 'ubuntu-20.04'
    displayName: "kvmtest-t1-lag by TestbedV2"
    timeoutInMinutes: 240
    condition: succeeded()
    continueOnError: false
    steps:
      - template: ../.azure-pipelines/run-test-scheduler-template.yml
        parameters:
          TOPOLOGY: t1-lag
          MIN_WORKER: $(T1_LAG_INSTANCE_NUM)
          MAX_WORKER: $(T1_LAG_INSTANCE_NUM)

  - job: dualtor_testbedv2
    pool:
      vmImage: 'ubuntu-20.04'
    displayName: "kvmtest-dualtor-t0 by TestbedV2"
    timeoutInMinutes: 240
    condition: succeeded()
    continueOnError: false
    steps:
      - template: ../.azure-pipelines/run-test-scheduler-template.yml
        parameters:
          TOPOLOGY: dualtor
          MIN_WORKER: $(T0_DUALTOR_INSTANCE_NUM)
          MAX_WORKER: $(T0_DUALTOR_INSTANCE_NUM)
          COMMON_EXTRA_PARAMS: "--disable_loganalyzer "

  - job: wan_testbedv2
    displayName: "kvmtest-wan by TestbedV2"
    pool:
      vmImage: 'ubuntu-20.04'
    timeoutInMinutes: 240
    condition: succeeded()
    continueOnError: true
    steps:
      - template: ../.azure-pipelines/run-test-scheduler-template.yml
        parameters:
          TOPOLOGY: wan-pub
          MIN_WORKER: $(WAN_INSTANCE_NUM)
          MAX_WORKER: $(WAN_INSTANCE_NUM)
          COMMON_EXTRA_PARAMS: "--skip_sanity "