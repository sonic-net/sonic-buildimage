# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml
# Build and push sonic-slave-[trixie|bookworm] images for amd64/armhf/arm64
pr: none

parameters:
- name: 'dists'
  type: object
  default:
  - trixie
  - bookworm
- name: registry_url
  type: string
  default: sonicdev-microsoft.azurecr.io
- name: registry_conn
  type: string
  default: sonicdev

stages:
- stage: Build_in_amd64
  jobs:
  - ${{ each dist in parameters.dists }}:
    - ${{ if endswith(variables['Build.DefinitionName'], dist) }}:
      - template: docker-sonic-slave-template.yml
        parameters:
          pool: sonicms1ES
          arch: amd64
          dist: ${{ dist }}
- stage: Build_native_arm
  dependsOn: []
  jobs:
  - ${{ each dist in parameters.dists }}:
    - ${{ if endswith(variables['Build.DefinitionName'], dist) }}:
      - template: docker-sonic-slave-template.yml
        parameters:
          pool: sonicms1ES-armhf
          arch: armhf
          dist: ${{ dist }}
          march: armhf
      - template: docker-sonic-slave-template.yml
        parameters:
          pool: sonicms1ES-arm64
          arch: arm64
          dist: ${{ dist }}
          march: arm64
