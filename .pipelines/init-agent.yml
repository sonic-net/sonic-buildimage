steps:
  - script: |
      set -x
      ip addr || echo $?
      docker info || echo $?
      df -h || echo $?
      lsblk -i || echo $?
      ls -al / || echo $?
      echo $USER $(id) || echo $?
    displayName: debug
  - script: |
      set -ex

      # Install Azure cli
      curl -sL https://aka.ms/InstallAzureCLIDeb | sed 's/apt-get/apt-get -o DPkg::Lock::Timeout=600 -o DPkg::Lock::Tries=3/' | sudo bash
      az login --identity --client-id a9a0b0f2-cd25-4abf-b3a2-2ef735a27c89
      # Install Azcopy
      if dpkg --print-architecture | grep amd64; then
        wget -O- "https://aka.ms/downloadazcopy-v10-linux" | tar -zxf - --strip-components=1
      else
        wget -O- "https://aka.ms/downloadazcopy-v10-linux-arm64" | tar -zxf - --strip-components=1
      fi
      sudo chmod a+x azcopy
      sudo mv -f azcopy /usr/local/bin/
      azcopy  --version
      export AZCOPY_AUTO_LOGIN_TYPE=AZCLI
      azcopy list https://sonicstorageinternal.blob.core.windows.net/agent

      # Init /data
      if ! mountpoint /data;then
        sudo mkdir -p /data
        disk=$(lsblk -i | grep '1T' | awk '{print$1}' | head -n 1)
        sudo sgdisk -n 0:0:0 -t 0:8300 -c 0:data /dev/$disk
        sudo mkfs.ext4 -F /dev/${disk}p1
        sudo mount ${disk}1 /data
      fi

      # Install NFS related packages
      sudo apt-get update
      sleep 1
      sudo apt-get install -y nfs-common unzip wget aznfs
      # Upgrade jinja2 to use j2 in Makefile.work
      sudo pip3 install --upgrade jinja2
      
      # Make symbolic link for the workspace to increase the space
      sudo rm -rf $(Agent.BuildDirectory)/s /data/w
      sudo mkdir /data/w
      sudo setfacl -R -b /data/w
      sudo chown $USER:$(id -gn) /data/w
      mkdir /data/w/s
      sudo rm -rf $(Agent.BuildDirectory)
      ln -s /data/w $(Agent.BuildDirectory)
      echo "pwd=$(pwd)"
      ls -lt $(Agent.BuildDirectory) $(Agent.BuildDirectory)/s

      # Mount nfs
      if ! mount | grep 'on /nfs'; then
        sudo mkdir /nfs -p
        sudo mount -t aznfs intnfs.file.core.windows.net:/intnfs/nfs /nfs -o vers=4,minorversion=1,sec=sys,nconnect=4
        sudo chown nobody /nfs
        sudo chmod u=rwx,g=rwx,o=r /nfs
      fi
    retryCountOnTaskFailure: 5
    displayName: 'Init agent'
