parameters:
  - name: PLATFORM_ARCH
    type: string
    values:
      - amd64
      - armhf
      - arm64
  - name: PLATFORM_NAME
    type: string
    values:
      - vs
      - generic
      - broadcom
      - mellanox
      - barefoot
      - marvell-prestera
      - cisco-8000
      - cisco-8000-arm64
      - nvidia-bluefield
      - pensando
  - name: OPTIONS
    type: string

steps:
  - template: /.pipelines/init-agent.yml
  - template: /.azure-pipelines/cleanup.yml
  - template: template-daemon.yml
  - task: SSH@0
    displayName: "test blobfuse2 on jumpbox"
    inputs:
      sshEndpoint: 'jumpbox'
      failOnStdErr: false
      runOptions: 'inline'
      readyTimeout: '20000'
      inline: |
        set -e

        if ls /azmirrors/nonexist 2>&1 | grep -i 'input/output error'; then
          fusermount3 -u /azmirrors
          blobfuse2 mount /azmirrors --config-file=/home/azureuser/blobfuse-images.yml
        fi
        if ls /azlinks/nonexist 2>&1 | grep -i 'input/output error'; then
          fusermount3 -u /azlinks
          blobfuse2 mount /azlinks --config-file=/home/azureuser/blobfuse-links.yml
        fi
        sleep 2
        if ls /azmirrors/nonexist /azlinks/nonexist 2>&1 | grep -i 'input/output error'; then
          exit 111
        fi
  - checkout: self
    clean: true
    submodules: recursive
    path: s
    displayName: 'Checkout code'
  - ${{ if eq(parameters.PLATFORM_NAME, 'cisco-8000') }}:
    - checkout: cisco-8000
      submodules: recursive
      path: s/platform/cisco-8000
      displayName: 'Checkout cisco-8000'
  - ${{ if eq(parameters.PLATFORM_NAME, 'pensando') }}:
    - checkout: pensando
      clean: true
      submodules: recursive
      path: s/platform/pensando/pensando-sonic-artifacts
      displayName: 'Checkout pensando-sonic-artifacts'
  - script: |
      set -o pipefail

      unset REGISTRY_SERVER
      mkdir -p target/release
      [[ "$(Build.Reason)" != "PullRequest" ]] && git checkout -b $(Build.SourceBranchName)
      . functions.sh
      SONIC_VERSION=$(sonic_get_version)
      echo SONIC_VERSION=${SONIC_VERSION} > sonic.properties
      echo $SONIC_VERSION > target/sonic.version
      LATEST_TAG=$(git describe --tags --abbrev=0 | grep -v merge$)
      echo $LATEST_TAG > target/sonic.latesttag
      echo "##vso[task.setvariable variable=SONIC_VERSION]$SONIC_VERSION"
      echo "##vso[task.setvariable variable=LATEST_TAG]$LATEST_TAG"
      set -ex

      rm -f target/sonic-installers
      make PLATFORM=${{ parameters.PLATFORM_NAME }} PLATFORM_ARCH=${{ parameters.PLATFORM_ARCH }} ${{ parameters.OPTIONS }} configure 2>&1 | tee target/build-slave.log
    displayName: 'Make configure'
    retryCountOnTaskFailure: 2
  - task: CodeQL3000Init@0
    inputs:
      ${{ if ne(variables['Build.Reason'], 'PullRequest') }}:
        Enabled: true
      ${{ else }}:
        Enabled: false

