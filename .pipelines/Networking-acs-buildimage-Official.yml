#################################################################################
#                               OneBranch Pipelines                             #
# This pipeline was created by EasyStart from a sample located at:              #
#   https://aka.ms/obpipelines/easystart/samples                                #
# Documentation:  https://aka.ms/obpipelines                                    #
# Yaml Schema:    https://aka.ms/obpipelines/yaml/schema                        #
# Retail Tasks:   https://aka.ms/obpipelines/tasks                              #
# Support:        https://aka.ms/onebranchsup                                   #
#################################################################################
trigger:
  batch: true
  branches:
    include:
      - internal
      - internal-202???
    exclude:
      - internal-2021??
      - internal-202211
      - internal-202012
variables:
  - name: CDP_DEFINITION_BUILD_COUNT
    value: $[counter('', 0)] # needed for onebranch.pipeline.version task https://aka.ms/obpipelines/versioning
  - name: DEBIAN_FRONTEND
    value: noninteractive
  - name: CDP_CLOUDVAULT_VERSION_SANITIZE
    value: true
  - name: DOCKER_BUILD_TIMEOUT
    value: 3600
  - group: SONiC-sonicbld
  - group: SONIC-BUILD-VG-1
resources:
  repositories: 
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main
    - repository: cisco-8000
      type: github
      name: Cisco-8000-sonic/platform-cisco-8000
      endpoint: cisco-connection
parameters:
- name: BRANCH_FOLDER
  default: 'default'
- name: jobFilters
  type: object
  default:
  - vs
  - broadcom
  - mellanox
  - marvell-armhf
  - cisco-8000
extends:
  template: v2/OneBranch.Official.CrossPlat.yml@templates # https://aka.ms/obpipelines/templates
  parameters:
    featureFlags:
      useUbuntu2004: true
      linuxHostSourceScan: true
    globalSdl: # https://aka.ms/obpipelines/sdl
      # tsa:
      #  enabled: true # SDL results of non-official builds aren't uploaded to TSA by default.
      # credscan:
      #   suppressionsFile: $(Build.SourcesDirectory)\.config\CredScanSuppressions.json
      policheck:
        break: false # always break the build on policheck issues. You can disable it by setting to 'false'
      # suppression:
      #   suppressionFile: $(Build.SourcesDirectory)\.gdn\global.gdnsuppress
    stages:
    - template: /.pipelines/template-stages.yml@self
      parameters:
        BRANCH_FOLDER: ${{ parameters.BRANCH_FOLDER }}
        CACHE: SONIC_DPKG_CACHE_METHOD=wcache
        JOBS: ${{ parameters.jobFilters }}

