parameters:
  - name: JOBS
    type: object
    default: {}
  - name: BRANCH_FOLDER
    default: 'default'
  - name: CACHE
    values:
      - 'SONIC_DPKG_CACHE_METHOD=wcache'
      - 'SONIC_DPKG_CACHE_METHOD=rcache'
      - 'SONIC_DPKG_CACHE_METHOD=cache'
    default: 'SONIC_DPKG_CACHE_METHOD=rcache'
  - name: OPTIONS
    default: 'SONIC_VERSION_CONTROL_COMPONENTS=py2,py3,web,git,docker MIRROR_SNAPSHOT=y DEFAULT_CONTAINER_REGISTRY=publicmirror.azurecr.io ENABLE_DOCKER_BASE_PULL=y
              SONIC_BUILD_RETRY_COUNT=3 SONIC_BUILD_RETRY_INTERVAL=600 DOCKER_BUILDKIT=0 SONIC_BUILD_JOBS=4 BUILD_PROCESS_TIMEOUT=7200
              PASSWORD=$(SONIC_PASSWORD) INCLUDE_RESTAPI=y ENABLE_FIPS=y SHUTDOWN_BGP_ON_START=y ENABLE_PFCWD_ON_START=y ENABLE_DHCP_GRAPH_SERVICE=y'
stages:
- ${{ if containsValue(parameters.JOBS, 'vs') }}:
  - stage: BuildVS
    jobs:
    - job: vs
      ${{ if ne(variables['Build.DefinitionName'], 'Networking-acs-buildimage-Official-OneBranch') }}:
        timeoutInMinutes: 840
      pool:
        type: linux
        isCustom: true
        name: sonic-image-builder-1ES
      variables:
        ob_artifactBaseName: sonic-buildimage.vs
      steps:
        - template: /.pipelines/template-presteps.yml@self
          parameters:
            PLATFORM_NAME: vs
            PLATFORM_ARCH: amd64
            OPTIONS: ${{ parameters.OPTIONS }}
        - script: |
            # skip because internal branch 3 kvmtest cases keeps failing.
            echo "$(System.PullRequest.SourceBranch)"
            if echo "$(System.PullRequest.SourceBranch)" | grep -e sonicbld/precheck/head/ -e sonicbld/code-sync/internal; then
              echo "##vso[task.setvariable variable=githubPR;isOutput=true]true"
            else
              echo "##vso[task.setvariable variable=githubPR;isOutput=true]false"
            fi
          name: skipstep
          displayName: set githubPR
        - script: |
            set -ex

            OPTIONS="${{ parameters.OPTIONS }} ${{ parameters.CACHE }} SONIC_DPKG_CACHE_SOURCE=/nfs/dpkg_cache/vs INCLUDE_KUBERNETES_MASTER=n BUILD_MULTIASIC_KVM=y"
            make $OPTIONS target/docker-sonic-vs.gz target/sonic-vs.img.gz target/docker-ptf.gz target/docker-auditd.gz target/docker-auditd-watchdog.gz
          displayName: Build SONiC image
        - script: |
            set -ex
            gzip -kd target/sonic-vs.img.gz
            SONIC_RUN_CMDS="qemu-img convert target/sonic-vs.img -O vhdx -o subformat=dynamic target/sonic-vs.vhdx" make BLDENV=bookworm -f Makefile.work $OPTIONS sonic-slave-run
            rm target/sonic-vs.img target/*.bin target/*.gz
            gzip target/sonic-vs.vhdx
          displayName: generate vhdx image
          condition: and(succeeded(), eq(variables.VHDX, true))
        - template: /.pipelines/template-poststeps.yml@self
          parameters:
            PLATFORM_NAME: vs
            BRANCH_FOLDER: ${{ parameters.BRANCH_FOLDER }}

- ${{ if or(gt(length(parameters.JOBS), 1), not(containsValue(parameters.JOBS, 'vs'))) }}:
  - stage: Build
    dependsOn: []
    jobs:
    - ${{ if containsValue(parameters.JOBS, 'broadcom') }}:
      - job: broadcom
        ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
          timeoutInMinutes: 840
        pool:
          type: linux
          isCustom: true
          name: sonic-image-builder-1ES
        variables:
          ob_artifactBaseName: sonic-buildimage.broadcom
        steps:
          - template: /.pipelines/template-presteps.yml@self
            parameters:
              PLATFORM_NAME: broadcom
              PLATFORM_ARCH: amd64
              OPTIONS: ${{ parameters.OPTIONS }}
          - script: |
              set -ex

              failures=''
              OPTIONS="${{ parameters.OPTIONS }} ${{ parameters.CACHE }} SONIC_DPKG_CACHE_SOURCE=/nfs/dpkg_cache/broadcom"
              echo "==== Building slim images"
              echo "INCLUDE_ACMS = y" >> rules/config.user
              echo "INCLUDE_MUX = n" >> rules/config.user
              echo "INCLUDE_KUBERNETES = n" >> rules/config.user
              echo "INCLUDE_MACSEC = n" >> rules/config.user
              echo "INCLUDE_P4RT = n" >> rules/config.user
              echo "BUILD_REDUCE_IMAGE_SIZE = y" >> rules/config.user
              echo "INCLUDE_GBSYNCD = n" >> rules/config.user
              echo "INCLUDE_SYSTEM_TELEMETRY = n" >> rules/config.user
              echo "ENABLE_GNMI_TWO_PROCESS = y" >> rules/config.user
              echo "INCLUDE_SYSTEM_EVENTD = n" >> rules/config.user
              make $OPTIONS target/sonic-broadcom.bin target/sonic-aboot-broadcom.swi target/docker-auditd.gz target/docker-auditd-watchdog.gz
              mv target/sonic-broadcom.bin target/sonic-broadcom-slim.bin
              mv target/sonic-aboot-broadcom.swi target/sonic-aboot-broadcom-slim.swi
              rm -rf target/*.squashfs
              rm rules/config.user
              rm target/docker-sonic-gnmi.gz
              echo "==== Finished building slim images"
              echo "==== Building swi images"
              echo "INCLUDE_DHCP_SERVER = y" >> rules/config.user
              make $OPTIONS target/sonic-aboot-broadcom.swi
              mv target/sonic-aboot-broadcom.swi target/release/
              rm -rf target/*.squashfs
              rm rules/config.user
              echo "==== Finished building swi images"
              echo "==== Building regular images"
              make $OPTIONS target/sonic-broadcom.bin
              mv target/sonic-broadcom.bin target/sonic-broadcom-dnx.bin target/release/
              rm -rf target/*.squashfs
              echo "==== Finished building regular images"
              echo "==== Building syncd-rpc docker"
              make $OPTIONS ENABLE_SYNCD_RPC=y target/docker-syncd-brcm-rpc.gz
              echo "==== Finished building syncd-rpc docker"
              echo "==== Building one debug image"
              make $OPTIONS INSTALL_DEBUG_TOOLS=y target/sonic-broadcom.bin
              mv target/sonic-broadcom.bin target/sonic-broadcom-dbg.bin
              echo "==== Finished building one debug image"
              mv target/release/* target/
              [[ "$failures" != '' ]] && echo "Build failures: $failures"
              set +x
              echo "##vso[task.setvariable variable=build_result]$failures"
            displayName: Build SONiC image
          - script: |
              echo $(build_result)
              [[ "$(build_result)" == '' ]] && echo "ALL SUCCEEDED" || exit 1
            continueOnError: true
            displayName: Check Result
          - template: /.pipelines/template-poststeps.yml@self
            parameters:
              PLATFORM_NAME: broadcom
              BRANCH_FOLDER: ${{ parameters.BRANCH_FOLDER }}
    - ${{ if containsValue(parameters.JOBS, 'mellanox') }}:
      - job: mellanox
        ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
          timeoutInMinutes: 840
        pool:
          type: linux
          isCustom: true
          name: sonic-image-builder-1ES
        variables:
          ob_artifactBaseName: sonic-buildimage.mellanox
        steps:
          - template: /.pipelines/template-presteps.yml@self
            parameters:
              PLATFORM_NAME: mellanox
              PLATFORM_ARCH: amd64
              OPTIONS: ${{ parameters.OPTIONS }}
          - script: |
              set -ex
              OPTIONS="${{ parameters.OPTIONS }} ${{ parameters.CACHE }} SONIC_DPKG_CACHE_SOURCE=/nfs/dpkg_cache/mellanox"
              make $OPTIONS INCLUDE_VNET_MONITOR=y SMARTSWITCH=1 INCLUDE_DHCP_SERVER=y target/sonic-mellanox.bin
              mv target/sonic-mellanox.bin target/sonic-mellanox-smartswitch.bin
              make $OPTIONS INCLUDE_VNET_MONITOR=y target/sonic-mellanox.bin target/docker-auditd.gz target/docker-auditd-watchdog.gz
              make $OPTIONS ENABLE_SYNCD_RPC=y target/docker-syncd-mlnx-rpc.gz
              cp target/debs/bookworm/python-saithrift*.deb target/ || true
            displayName: Build SONiC image
          - template: /.pipelines/template-poststeps.yml@self
            parameters:
              PLATFORM_NAME: mellanox
              BRANCH_FOLDER: ${{ parameters.BRANCH_FOLDER }}

    - ${{ if containsValue(parameters.JOBS, 'nvidia-bluefield') }}:
      - job: nvidia_bluefield
        ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
          timeoutInMinutes: 840
        pool:
          type: linux
          isCustom: true
          name: sonic-arm64
        variables:
          ob_artifactBaseName: sonic-buildimage.nvidia-bluefield
        steps:
          - template: /.pipelines/template-presteps.yml@self
            parameters:
              PLATFORM_NAME: nvidia-bluefield
              PLATFORM_ARCH: arm64
              OPTIONS: ${{ parameters.OPTIONS }}
          - script: |
              set -ex
              OPTIONS="${{ parameters.OPTIONS }} ${{ parameters.CACHE }} SONIC_DPKG_CACHE_SOURCE=/nfs/dpkg_cache/nvidia-bluefield"
              make $OPTIONS target/sonic-nvidia-bluefield.bin
            displayName: Build SONiC image
          - template: /.pipelines/template-poststeps.yml@self
            parameters:
              PLATFORM_NAME: nvidia-bluefield
              BRANCH_FOLDER: ${{ parameters.BRANCH_FOLDER }}
    - ${{ if containsValue(parameters.JOBS, 'marvell-armhf') }}:
      - job: marvell_armhf
        ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
          timeoutInMinutes: 840
        pool:
          type: linux
          isCustom: true
          name: sonic-armhf
        variables:
          ob_artifactBaseName: sonic-buildimage.marvell-armhf
          PLATFORM_ARCH: armhf
        steps:
          - template: /.pipelines/template-presteps.yml@self
            parameters:
              PLATFORM_NAME: marvell
              PLATFORM_ARCH: armhf
              OPTIONS: ${{ parameters.OPTIONS }}
          - script: |
              set -ex
              OPTIONS="${{ parameters.OPTIONS }} ${{ parameters.CACHE }} SONIC_DPKG_CACHE_SOURCE=/nfs/dpkg_cache/marvell-armhf INCLUDE_DHCP_SERVER=y"
              make $OPTIONS target/sonic-marvell-armhf.bin target/docker-auditd.gz target/docker-auditd-watchdog.gz
            displayName: Build SONiC image
          - template: /.pipelines/template-poststeps.yml@self
            parameters:
              PLATFORM_NAME: marvell-armhf
              BRANCH_FOLDER: ${{ parameters.BRANCH_FOLDER }}
    - ${{ if containsValue(parameters.JOBS, 'cisco-8000') }}:
      - template: template-cisco.yml
        parameters:
          NAME: cisco-8000
          OPTIONS: ${{ parameters.OPTIONS }}
          CACHE: ${{ parameters.CACHE }}
          BRANCH_FOLDER: ${{ parameters.BRANCH_FOLDER }}
    - ${{ if containsValue(parameters.JOBS, 'cisco-8000-smartswitch') }}:
      - template: template-cisco.yml
        parameters:
          NAME: cisco-8000-smartswitch
          OPTIONS: '${{ parameters.OPTIONS }} SMARTSWITCH=1'
          CACHE: ${{ parameters.CACHE }}
          BRANCH_FOLDER: ${{ parameters.BRANCH_FOLDER }}
