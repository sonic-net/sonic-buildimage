[pytest]
# Test file patterns
python_files = test_*.py

# Test function patterns
python_functions = test_*

# Additional options
addopts =
    --verbose
    --strict-markers

# Python path for imports (includes fixtures directory and nexthop_utils source)
pythonpath =
    test
    ../../nexthop-common/sonic-platform-nexthop-utils

# Test markers (optional - for categorizing tests)
markers =
    unit: Unit tests
    integration: Integration tests
