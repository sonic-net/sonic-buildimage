<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  D-Bus policy for sonic-dbus-bridge ObjectMapper.

  This allows the sonic-dbus-bridge process to own the
  xyz.openbmc_project.ObjectMapper service name on the system bus
  and to receive/call methods using this name.
-->
<busconfig>

  <!-- Only root can own the xyz.openbmc_project.ObjectMapper bus -->
  <policy user="root">
    <allow own="xyz.openbmc_project.ObjectMapper"/>
    <allow send_destination="xyz.openbmc_project.ObjectMapper"/>
  </policy>

  <!-- Allow all users to call methods on our ObjectMapper object -->
  <policy context="default">
    <allow send_destination="xyz.openbmc_project.ObjectMapper"/>
    <allow receive_sender="xyz.openbmc_project.ObjectMapper"/>
  </policy>

</busconfig>

