<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  D-Bus policy for sonic-dbus-bridge.

  This allows the sonic-dbus-bridge process to own the
  xyz.openbmc_project.Inventory.Manager service name on the system bus
  and expose xyz.openbmc_project.* interfaces.
-->
<busconfig>

  <!-- Only root can own the xyz.openbmc_project.Inventory.Manager bus -->
  <policy user="root">
    <allow own="xyz.openbmc_project.Inventory.Manager"/>
    <allow send_destination="xyz.openbmc_project.Inventory.Manager"/>
  </policy>

  <!-- Allow all users to call methods on our objects -->
  <policy context="default">
    <allow send_destination="xyz.openbmc_project.Inventory.Manager"/>
    <allow receive_sender="xyz.openbmc_project.Inventory.Manager"/>
  </policy>

</busconfig>

