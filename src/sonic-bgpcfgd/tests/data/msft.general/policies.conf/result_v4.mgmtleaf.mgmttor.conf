!
! template: bgpd/templates/general/policies.conf.j2
!
! template: bgpd/templates/msft.general/v4.mgmtleaf.mgmttor.all/policy.conf.j2
!
ip prefix-list DEFAULT_IPV4 seq 5 permit 0.0.0.0/0
!
bgp as-path access-list LOCALROUTES permit ^$
!
bgp community-list standard FABRIC_INFRA_COMMUNITY permit 8075:316
!
route-map TO_DOWNSTREAM_V4 permit 100
  match ip address prefix-list DEFAULT_IPV4
!
route-map TO_DOWNSTREAM_V4 permit 200
  match as-path LOCALROUTES
  set community 8075:316 additive
!
route-map TO_DOWNSTREAM_V4 permit 300
  match community FABRIC_INFRA_COMMUNITY
!
route-map TO_DOWNSTREAM_V4 deny 1000
!
route-map FROM_DOWNSTREAM_V4 permit 1000
!
! end of template: bgpd/templates/msft.general/v4.mgmtleaf.mgmttor.all/policy.conf.j2
!
! end of template: bgpd/templates/general/policies.conf.j2
!
