!
! template: bgpd/templates/general/policies.conf.j2
!
! template: bgpd/templates/msft.general/v6.leaf.ai.backend/policy.conf.j2
!
bgp community-list standard ComputeAI_BackEnd permit 8075:9314
!
ipv6 prefix-list DEFAULT_IPV6 permit any
!
route-map TO_BE_TIER0_V6 permit 100
    match ipv6 address prefix-list PL_LoopbackV6
    set community 8075:9314
!
route-map TO_BE_TIER0_V6 permit 110
!
route-map FROM_BE_TIER0_V6 permit 100
    set ipv6 next-hop prefer-global
    on-match next
!
route-map FROM_BE_TIER0_V6 permit 110
!
! end of template: bgpd/templates/msft.general/v6.leaf.ai.backend/policy.conf.j2
!
! end of template: bgpd/templates/general/policies.conf.j2
!
