!
! template: bgpd/templates/general/policies.conf.j2
!
! template: bgpd/templates/msft.general/v6.leaf.spine.fairwater.backend/policy.conf.j2
!
route-map TO_BE_TIER2_V6 deny 100
  match community LargeComputeAI_BE_Loopback
!
route-map TO_BE_TIER2_V6 deny 110
  match community LargeComputeAI_BE_Vlan
!
route-map TO_BE_TIER2_V6 deny 120
  match community COMM_FAIRWATER_BE_PREFIX
!
route-map TO_BE_TIER2_V6 permit 200
!
!
route-map FROM_BE_TIER2_V6 permit 100
  on-match next
  set ipv6 next-hop prefer-global
!
route-map FROM_BE_TIER2_V6 permit 200
!
! end of template: bgpd/templates/msft.general/v6.leaf.spine.fairwater.backend/policy.conf.j2
!
! end of template: bgpd/templates/general/policies.conf.j2
!
