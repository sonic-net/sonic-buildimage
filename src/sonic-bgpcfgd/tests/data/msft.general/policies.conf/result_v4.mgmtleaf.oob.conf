!
! template: bgpd/templates/general/policies.conf.j2
!
! template: bgpd/templates/msft.general/v4.mgmtleaf.oob/policy.conf.j2
!
ip prefix-list DEFAULT_IPV4 seq 5 permit 0.0.0.0/0
!
route-map TO_VPN_OOB_V4 deny 100
  match ip address prefix-list DEFAULT_IPV4
!
route-map TO_VPN_OOB_V4 permit 1000
 set community 8075:9120 additive
!
route-map FROM_VPN_OOB_V4 permit 100
  match ip address prefix-list DEFAULT_IPV4
  set as-path prepend 65100
!
route-map FROM_VPN_OOB_V4 deny 1000
!
! end of template: bgpd/templates/msft.general/v4.mgmtleaf.oob/policy.conf.j2
!
! end of template: bgpd/templates/general/policies.conf.j2
!
