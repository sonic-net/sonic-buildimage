!
! template: bgpd/templates/general/policies.conf.j2
!
! template: bgpd/templates/msft.general/v4.mgmtagg/policy.conf.j2
!
ip prefix-list DEFAULT_IPV4 seq 5 permit 0.0.0.0/0
!
bgp as-path access-list LOCALROUTES permit ^$
bgp as-path access-list WAN_ASNS permit _58593_
!
route-map TO_CORE_V4 deny 10
  match ip address prefix-list DEFAULT_IPV4

route-map TO_CORE_V4 deny 20
  match as-path WAN_ASNS

route-map TO_CORE_V4 permit 1000
!
route-map FROM_CORE_V4 permit 10
  match ip address prefix-list DEFAULT_IPV4

route-map FROM_CORE_V4 permit 1000
!
! end of template: bgpd/templates/msft.general/v4.mgmtagg/policy.conf.j2
!
! end of template: bgpd/templates/general/policies.conf.j2
!
