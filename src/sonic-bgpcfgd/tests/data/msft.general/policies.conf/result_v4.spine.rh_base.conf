!
! template: bgpd/templates/msft.general/v4.spine.rh/policy.conf.j2
!
bgp community-list standard LEAK_COMMUNITY permit 8075:10400
bgp community-list standard INREGION_LEAK_COMMUNITY permit 8075:8848
bgp community-list standard FABRIC_INFRA_COMMUNITY permit 8075:316
bgp community-list standard ANCHOR_ROUTE_COMMUNITY permit 1111:1111
bgp community-list standard LOCAL_ANCHOR_ROUTE_COMMUNITY permit 2222:2222
bgp community-list standard ANCHOR_CONTRIBUTING_ROUTE_COMMUNITY permit 3333:3333
!
bgp as-path access-list WAN_ASNS permit _8075_
bgp as-path access-list WAN_ASNS permit _8074_
bgp as-path access-list WAN_ASNS permit _8072_
!
ip prefix-list DEFAULT_IPV4 permit 0.0.0.0/0
!
route-map SELECTIVE_ROUTE_DOWNLOAD_V4 deny 10
  match community LOCAL_ANCHOR_ROUTE_COMMUNITY
!
route-map SELECTIVE_ROUTE_DOWNLOAD_V4 permit 1000
!
route-map TAG_ANCHOR_COMMUNITY permit 10
  set community 2222:2222 1111:1111 additive
!
route-map FROM_RH_V4 permit 100
  match ip address prefix-list DEFAULT_IPV4
!
route-map FROM_RH_V4 deny 150
  match as-path T2_GROUP_ASNS
!
route-map FROM_RH_V4 permit 200
  match community LEAK_COMMUNITY
!
route-map FROM_RH_V4 permit 300
  match community INREGION_LEAK_COMMUNITY
!
route-map FROM_RH_V4 permit 400
  match community FABRIC_INFRA_COMMUNITY
!
route-map FROM_RH_V4 deny 1000
!
route-map TO_RH_V4 permit 30
  match ip address prefix-list ANCHOR_CONTRIBUTING_ROUTES
  set community 3333:3333 additive
  on-match next
!
route-map TO_RH_V4 deny 100
  match as-path WAN_ASNS
!
route-map TO_RH_V4 deny 200
  match ip address prefix-list DEFAULT_IPV4
!
route-map TO_RH_V4 permit 1000
  set comm-list LOCAL_ANCHOR_ROUTE_COMMUNITY delete
!
! end of template: bgpd/templates/msft.general/v4.spine.rh/policy.conf.j2
!
