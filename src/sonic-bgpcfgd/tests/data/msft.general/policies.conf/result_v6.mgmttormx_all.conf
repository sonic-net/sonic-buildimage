!
! template: bgpd/templates/general/policies.conf.j2
!
! template: bgpd/templates/msft.general/v6.mgmttor.mx/policy.conf.j2
!
ipv6 prefix-list IPV6_64_ONLY permit ::/0 ge 64 le 64
!
route-map FROM_TIER0_V6 permit 100
 set ipv6 next-hop prefer-global
 on-match next
route-map FROM_TIER0_V6 permit 200
!
route-map TO_TIER0_V6 permit 100
  match ipv6 address prefix-list IPV6_64_ONLY
!
! end of template: bgpd/templates/msft.general/v6.mgmttor.mx/policy.conf.j2
!
! end of template: bgpd/templates/general/policies.conf.j2
!
