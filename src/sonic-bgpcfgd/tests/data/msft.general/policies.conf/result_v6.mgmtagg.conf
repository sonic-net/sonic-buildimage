!
! template: bgpd/templates/general/policies.conf.j2
!
! template: bgpd/templates/msft.general/v6.mgmtagg/policy.conf.j2
!
ipv6 prefix-list DEFAULT_IPV6 seq 5 permit ::/0
!
bgp as-path access-list LOCALROUTES permit ^$ any
bgp as-path access-list WAN_ASNS permit _58593_ any
!
route-map TO_CORE_V6 deny 10
  match ip address prefix-list DEFAULT_IPV6

route-map TO_CORE_V6 deny 20
  match as-path WAN_ASNS

route-map TO_CORE_V6 permit 1000
!
route-map FROM_CORE_V6 permit 10
  match ip address prefix-list DEFAULT_IPV6

route-map FROM_CORE_V6 permit 1000
!
! end of template: bgpd/templates/msft.general/v6.mgmtagg/policy.conf.j2
!
! end of template: bgpd/templates/general/policies.conf.j2
!
