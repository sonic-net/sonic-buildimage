!
! template: bgpd/templates/general/policies.conf.j2
!
! template: bgpd/templates/msft.general/v6.leaf.tor.fairwater.backend/policy.conf.j2
!
ipv6 prefix-list DEFAULT_IPV6 seq 5 permit ::/0
!
bgp community-list standard LargeComputeAI_BE_Loopback permit 65219:999
bgp community-list standard LargeComputeAI_BE_Vlan permit 65219:998
bgp community-list standard COMM_FAIRWATER_BE_PREFIX permit 65219:65219
bgp as-path access-list LOCAL_AS seq 10 permit ^$
!
!
route-map TO_BE_TIER0_V6 permit 110
  match ipv6 address prefix-list DEFAULT_IPV6
!
route-map TO_BE_TIER0_V6 permit 110
  match community LargeComputeAI_BE_Loopback
!
route-map TO_BE_TIER0_V6 permit 120
  match community LargeComputeAI_BE_Vlan
!
route-map TO_BE_TIER0_V6 permit 130
  match community COMM_FAIRWATER_BE_PREFIX
!
route-map TO_BE_TIER0_V6 permit 140
  match as-path LOCAL_AS
  set community no-export additive
!
route-map TO_BE_TIER0_V6 deny 200
!
!
route-map FROM_BE_TIER0_V6 permit 100
  on-match next
  set ipv6 next-hop prefer-global
!
route-map FROM_BE_TIER0_V6 permit 200
!
! end of template: bgpd/templates/msft.general/v6.leaf.tor.fairwater.backend/policy.conf.j2
!
! end of template: bgpd/templates/general/policies.conf.j2
!
