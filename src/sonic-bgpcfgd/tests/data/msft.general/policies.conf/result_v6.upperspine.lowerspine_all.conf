!
! template: bgpd/templates/general/policies.conf.j2
!
! template: bgpd/templates/msft.general/v6.upperspine.lowerspine/policy.conf.j2
!
bgp community-list standard LEAK_COMMUNITY permit 8075:10400
bgp community-list standard INREGION_LEAK_COMMUNITY permit 8075:8848
!
bgp as-path access-list T2_LOOPBACK permit ^$
!
ipv6 prefix-list DEFAULT_IPV6 permit ::/0
!
route-map FROM_LOWERSPINE_V6 permit 100
 set ipv6 next-hop prefer-global
 on-match next
!
route-map FROM_LOWERSPINE_V6 permit 200
!
route-map TO_LOWERSPINE_V6 permit 100
  match ipv6 address prefix-list DEFAULT_IPV6
!
route-map TO_LOWERSPINE_V6 permit 200
  match community LEAK_COMMUNITY
!
route-map TO_LOWERSPINE_V6 permit 300
  match community INREGION_LEAK_COMMUNITY
!
route-map TO_LOWERSPINE_V6 permit 400
  match as-path T2_LOOPBACK
!
route-map TO_LOWERSPINE_V6 deny 1000
!
! end of template: bgpd/templates/msft.general/v6.upperspine.lowerspine/policy.conf.j2
!
! end of template: bgpd/templates/general/policies.conf.j2
!
