!
! template: bgpd/templates/general/policies.conf.j2
!
! template: bgpd/templates/msft.general/v6.mgmtagg.oob/policy.conf.j2
!
ipv6 prefix-list DEFAULT_IPV6 seq 5 permit ::/0
!
route-map TO_VPN_OOB_V6 deny 10
  match ipv6 address prefix-list DEFAULT_IPV6
!
route-map TO_VPN_OOB_V6 permit 1000
!
route-map FROM_VPN_OOB_V6 permit 10
  match ipv6 address prefix-list DEFAULT_IPV6
  set as-path prepend 64582
!
route-map FROM_VPN_OOB_V6 deny 1000
!
! end of template: bgpd/templates/msft.general/v6.mgmtagg.oob/policy.conf.j2
!
! end of template: bgpd/templates/general/policies.conf.j2
!
