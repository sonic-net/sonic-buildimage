!
! template: bgpd/templates/general/peer-group.conf.j2
!
! template: bgpd/templates/msft.general/v6.lowerspine.upperspine/peer-group.conf.j2
!
  neighbor UPPERSPINE_V6 peer-group
  address-family ipv4 unicast
    neighbor UPPERSPINE_V6 activate
    neighbor UPPERSPINE_V6 soft-reconfiguration inbound
    neighbor UPPERSPINE_V6 route-map FROM_UPPERSPINE_V6 in
    neighbor UPPERSPINE_V6 route-map TO_UPPERSPINE_V6 out
    neighbor UPPERSPINE_V6 send-community
    neighbor UPPERSPINE_V6 maximum-prefix 64000 90 warning-only
  exit-address-family
!
! end of template: bgpd/templates/msft.general/v6.lowerspine.upperspine/peer-group.conf.j2
!
! end of template: bgpd/templates/general/peer-group.conf.j2
!
