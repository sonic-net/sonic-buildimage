!
! template: bgpd/templates/general/peer-group.conf.j2
!
! template: bgpd/templates/msft.general/v4.mgmtagg/peer-group.conf.j2
!
  neighbor CORE_V4 peer-group
  address-family ipv4 unicast
    neighbor CORE_V4 activate
    neighbor CORE_V4 soft-reconfiguration inbound
    neighbor CORE_V4 route-map FROM_CORE_V4 in
    neighbor CORE_V4 route-map TO_CORE_V4 out
    neighbor CORE_V4 send-community
    neighbor CORE_V4 maximum-prefix 4000 90 warning-only
    neighbor CORE_V4 remove-private-AS all
  exit-address-family
!
! end of template: bgpd/templates/msft.general/v4.mgmtagg/peer-group.conf.j2
!
! end of template: bgpd/templates/general/peer-group.conf.j2
!
