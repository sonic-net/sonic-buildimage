!
! template: bgpd/templates/general/peer-group.conf.j2
!
! template: bgpd/templates/msft.general/v4.lowerspine.fabricspine/peer-group.conf.j2
!
  neighbor FABRICSPINE_V4 peer-group
  address-family ipv4 unicast
    neighbor FABRICSPINE_V4 activate
    neighbor FABRICSPINE_V4 allowas-in 1
    neighbor FABRICSPINE_V4 next-hop-self force
    neighbor FABRICSPINE_V4 soft-reconfiguration inbound
    neighbor FABRICSPINE_V4 route-map FROM_FABRICSPINE_V4 in
    neighbor FABRICSPINE_V4 route-map TO_FABRICSPINE_V4 out
    neighbor FABRICSPINE_V4 send-community
    neighbor FABRICSPINE_V4 maximum-prefix 64000 90 warning-only
  exit-address-family
!
! end of template: bgpd/templates/msft.general/v4.upperspine.lowerspine/peer-group.conf.j2
!
! end of template: bgpd/templates/general/peer-group.conf.j2
!
