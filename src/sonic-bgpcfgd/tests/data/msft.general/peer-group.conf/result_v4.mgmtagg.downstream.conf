!
! template: bgpd/templates/general/peer-group.conf.j2
!
! template: bgpd/templates/msft.general/v4.mgmtagg/peer-group.conf.j2
!
  neighbor DOWNSTREAM_V4 peer-group
  address-family ipv4 unicast
    neighbor DOWNSTREAM_V4 activate
    neighbor DOWNSTREAM_V4 soft-reconfiguration inbound
    neighbor DOWNSTREAM_V4 route-map FROM_DOWNSTREAM_V4 in
    neighbor DOWNSTREAM_V4 route-map TO_DOWNSTREAM_V4 out
    neighbor DOWNSTREAM_V4 send-community
    neighbor DOWNSTREAM_V4 maximum-prefix 4000 90 warning-only
  exit-address-family
!
! end of template: bgpd/templates/msft.general/v4.mgmtagg/peer-group.conf.j2
!
! end of template: bgpd/templates/general/peer-group.conf.j2
!
