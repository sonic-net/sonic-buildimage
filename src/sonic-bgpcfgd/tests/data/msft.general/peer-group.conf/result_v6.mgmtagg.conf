!
! template: bgpd/templates/general/peer-group.conf.j2
!
! template: bgpd/templates/msft.general/v6.mgmtagg/peer-group.conf.j2
!
  neighbor CORE_V6 peer-group
  address-family ipv6 unicast
    neighbor CORE_V6 activate
    neighbor CORE_V6 soft-reconfiguration inbound
    neighbor CORE_V6 route-map FROM_CORE_V6 in
    neighbor CORE_V6 route-map TO_CORE_V6 out
    neighbor CORE_V6 send-community
    neighbor CORE_V6 maximum-prefix 4000 90 warning-only
    neighbor CORE_V6 remove-private-AS all
  exit-address-family
!
! end of template: bgpd/templates/msft.general/v6.mgmtagg/peer-group.conf.j2
!
! end of template: bgpd/templates/general/peer-group.conf.j2
!
