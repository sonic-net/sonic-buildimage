! template: bgpd/templates/msft.general/v6.tor.fairwater.backend.frontend.canarypilot/peer-group.conf.j2
!
  neighbor FE_TIER0_V6 peer-group
  address-family ipv6 unicast
   neighbor FE_TIER0_V6 activate
   neighbor FE_TIER0_V6 soft-reconfiguration inbound
   neighbor FE_TIER0_V6 route-map FROM_FE_TIER0_V6 in
   neighbor FE_TIER0_V6 route-map TO_FE_TIER0_V6 out
   neighbor FE_TIER0_V6 send-community
   neighbor FE_TIER0_V6 maximum-prefix 18000 90 warning-only
   aggregate-address 2603:10b2:50a:1000::/64 summary-only as-set
   aggregate-address 2603:10b0:92b:8400::/64 summary-only as-set
   aggregate-address 2603:10b0:12e:a400::/64 summary-only as-set
  exit-address-family
!
! end of template: bgpd/templates/msft.general/v6.tor.fairwater.backend.frontend.canarypilot/peer-group.conf.j2
