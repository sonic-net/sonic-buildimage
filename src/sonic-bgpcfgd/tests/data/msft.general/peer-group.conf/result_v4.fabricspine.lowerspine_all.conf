!
! template: bgpd/templates/general/peer-group.conf.j2
!
! template: bgpd/templates/msft.general/v4.fabricspine.lowerspine/peer-group.conf.j2
!
  neighbor LOWERSPINE_V4 peer-group
  address-family ipv4 unicast
    neighbor LOWERSPINE_V4 activate
    neighbor LOWERSPINE_V4 route-reflector-client 
    neighbor LOWERSPINE_V4 next-hop-self force
    neighbor LOWERSPINE_V4 soft-reconfiguration inbound
    neighbor LOWERSPINE_V4 route-map FROM_LOWERSPINE_V4 in
    neighbor LOWERSPINE_V4 route-map TO_LOWERSPINE_V4 out
    neighbor LOWERSPINE_V4 send-community
    neighbor LOWERSPINE_V4 maximum-prefix 64000 90 warning-only
  exit-address-family
!
! end of template: bgpd/templates/msft.general/v4.upperspine.lowerspine/peer-group.conf.j2
!
! end of template: bgpd/templates/general/peer-group.conf.j2
!
