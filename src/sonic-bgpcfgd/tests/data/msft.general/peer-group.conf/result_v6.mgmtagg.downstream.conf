!
! template: bgpd/templates/general/peer-group.conf.j2
!
! template: bgpd/templates/msft.general/v6.mgmtagg/peer-group.conf.j2
!
  neighbor DOWNSTREAM_V6 peer-group
  address-family ipv6 unicast
    neighbor DOWNSTREAM_V6 activate
    neighbor DOWNSTREAM_V6 soft-reconfiguration inbound
    neighbor DOWNSTREAM_V6 route-map FROM_DOWNSTREAM_V6 in
    neighbor DOWNSTREAM_V6 route-map TO_DOWNSTREAM_V6 out
    neighbor DOWNSTREAM_V6 send-community
    neighbor DOWNSTREAM_V6 maximum-prefix 4000 90 warning-only
  exit-address-family
!
! end of template: bgpd/templates/msft.general/v6.mgmtagg/peer-group.conf.j2
!
! end of template: bgpd/templates/general/peer-group.conf.j2
!
