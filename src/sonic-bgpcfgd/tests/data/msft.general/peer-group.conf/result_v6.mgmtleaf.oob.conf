!
! template: bgpd/templates/general/peer-group.conf.j2
!
! template: bgpd/templates/msft.general/v6.mgmtleaf.oob/peer-group.conf.j2
!
  neighbor MB_PATH_V6 peer-group
  address-family ipv6 unicast
    neighbor MB_PATH_V6 activate
    neighbor MB_PATH_V6 soft-reconfiguration inbound
    neighbor MB_PATH_V6 route-map FROM_MB_PATH_V6 in
    neighbor MB_PATH_V6 route-map TO_MB_PATH_V6 out
    neighbor MB_PATH_V6 send-community
    neighbor MB_PATH_V6 maximum-prefix 1000 90 warning-only
  exit-address-family
!
! end of template: bgpd/templates/msft.general/v6.mgmtleaf.oob/peer-group.conf.j2
!
! end of template: bgpd/templates/general/peer-group.conf.j2
!
