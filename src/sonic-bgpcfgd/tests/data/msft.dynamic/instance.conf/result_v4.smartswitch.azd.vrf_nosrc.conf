!
! template: bgpd/templates/msft.dynamic/smartswitch.azd.vrf/instance.conf.j2
!
  neighbor dyn_name_v4 peer-group
  neighbor dyn_name_v4 passive
  neighbor dyn_name_v4 remote-as 11111
  bgp listen range 10.10.20.0/24 peer-group dyn_name_v4
  address-family ipv4 unicast
    neighbor dyn_name_v4 activate
    neighbor dyn_name_v4 soft-reconfiguration inbound
    neighbor dyn_name_v4 maximum-prefix 100
    neighbor dyn_name_v4 default-originate
    neighbor dyn_name_v4 route-map FROM_WLPARTNER_V4_VNET_Vnet1 in
    neighbor dyn_name_v4 route-map TO_WLPARTNER_V4 out
    maximum-paths 64
  exit-address-family
!
! end of template: bgpd/templates/msft.dynamic/smartswitch.azd.vrf/instance.conf.j2
!
