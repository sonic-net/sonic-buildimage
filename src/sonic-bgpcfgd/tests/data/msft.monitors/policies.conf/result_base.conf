route-map FROM_BGPMON deny 100
!
route-map TO_BGPMON permit 100
!
route-map FROM_BGPMON_V6 permit 100
 set ipv6 next-hop prefer-global
 on-match next
!
route-map FROM_BGPMON_V6 deny 300
!
route-map TO_BGPMON_V6 permit 100
