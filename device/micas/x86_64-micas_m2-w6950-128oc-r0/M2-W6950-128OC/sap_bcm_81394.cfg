# 配置文件版本号。
# 当前 sap_bcm_81394.c 并不会读取该字段，属于兼容/标识性信息，
# 修改它不会影响 81394 驱动的初始化流程。
version=1

# ====================
# 全局初始化参数
# ====================

# 板卡 slot 数量。
# sap_aperta_config_init() 会先读取该值到全局 g_slot_num，
# sap_bcm_platform_init() 再按 0 ~ g_slot_num-1 调用 sap_slot_init()。
# 该字段缺失会导致配置初始化直接失败。
plp_slot_num=1

# MDIO 访问类型，键名中的 :1 不是 PHY 地址，而是 mdio_id。
# 代码先读取 plp_phy_mdio_id:0x30=1，再反查 plp_mdio_accs_type:1。
# 取值来自 sap_mdio_type_e：
#   0 = MAC
#   1 = SYSFS
#   2 = SYSFS_CUST
# 当前值 2 表示走定制 sysfs MDIO 访问路径。
plp_mdio_accs_type:1=2

# 固件加载方式，保存到全局 g_fw_load_method。
# 81394 驱动中的定义为：
#   0 = 不加载
#   1 = 单播加载 unicast
#   2 = 广播加载 broadcast
#   3 = EEPROM 加载
#   4 = upgrade 路径
#   5 = skip
#   6 = full process
# 当前值 1 表示每颗 PHY 按单播方式下载固件。
plp_fw_load_method=1

# 是否启用 I2C slave。
# 代码会读取到 g_i2c_slave_en，但 81394 当前主流程里对应寄存器写入逻辑被整段注释掉，
# 因此这个值目前属于“已解析、默认不生效”的字段。
plp_i2c_slave_en=0

# AVS I2C 响应地址。
# 同样会被读取到 g_avs_i2c_resp_addr，供 sap_bcm_avs_init() 组装寄存器值使用；
# 但当前启动路径里 AVS 初始化没有实际启用，所以这里只是保留配置。
avs_i2c_resp_addr=0x35

# 端口 system side 默认是否启用 link training。
# 若没有配置到每端口专属的 init_linktrain_sys，则各端口继承该全局值。
# sap_aperta_post_port_init() 中仅当值为 1 时才会调用 sap_bcm_linktraining_set(..., true)。
# 0 表示不自动开启 LT。
plp_port_linktrain_sys=0

# 端口 line side 默认是否启用 link training。
# 语义与 plp_port_linktrain_sys 相同，只作用于 line 侧。
plp_port_linktrain_line=0

# ====================
# Profile 1 的 VCO 预设
# ====================

# Profile 1, octal 0, system side 的 VCO 选择。
# 81394 代码会强制读取并保存到 phy_info->vco_octal_0_sys。
# 可从公共头文件确认：
#   0 = bcmplpVco51G
#   1 = bcmplpVco53G
# 当前值 1 即 53G VCO。
# 注意：在这版 81394 实现里，该值被读取但未继续参与 mode_config_set，
# 更像是与同系列芯片共用配置格式而保留的字段。
plp_profile_1_init_vco_octal_0_sys=1

# Profile 1, octal 0, line side 的 VCO 选择。
# 当前值 1 = 53G VCO。
plp_profile_1_init_vco_octal_0_line=1

# Profile 1, octal 1, system side 的 VCO 选择。
# 当前板型只使用到一颗地址为 0x30 的 PHY 且 profile 中 lanes=0,1，
# 但代码仍要求把 octal 1 的 VCO 一并配置出来，否则配置解析失败。
plp_profile_1_init_vco_octal_1_sys=1

# Profile 1, octal 1, line side 的 VCO 选择。
# 当前值 1 = 53G VCO。
plp_profile_1_init_vco_octal_1_line=1

# ====================
# Profile 1: 100G, split=1, 单端口 4lane
# 键名格式：plp_profile_<profile>_speed_<speed>_split_<split_num>.<port_id>:<subkey>
# 这里改成单个 100G 端口，因此 split_num=1，port_id=0。
#
# 81394 代码里 split_num 不是手工写死，而是按：
#   phy_info->lane_num / port_info->lanes
# 计算得到。
# 因此想命中 split_1.0，下面的 init_lanes 需要给出 4 个 lane 条目，
# 而 init_ports_lane_num 则要配置成 4，表示这是一个 4lane 聚合端口。
# ====================

# line side FEC 模式。
# 100G 4x25G 场景下这里沿用当前文件原有的 RS-FEC 语义，即 3 = RSFEC。
# 这样仍然走 25.78125G/lane 的 NRZ 路径，而不是 2x50G PAM4。
plp_profile_1_speed_100000_split_1.0:fec_line=3

# system side FEC 模式。
# 与 line side 保持一致，也配置为 3 = RSFEC。
plp_profile_1_speed_100000_split_1.0:fec_sys=3

# line side 接口类型。
# bcm_pm_interface_t 中 7 = bcm_pm_InterfaceKR4。
# 这里从原先单 lane 的 KR 改为 4lane 的 KR4，匹配 100G 4lane 端口形态。
plp_profile_1_speed_100000_split_1.0:iftype_line=7

# system side 接口类型。
# 同样改为 7 = KR4，保持 system/line 两侧 lane 数与接口宽度一致。
plp_profile_1_speed_100000_split_1.0:iftype_sys=7

# line side lane bitmask。
# 0xF = 0000 1111b，表示选中 4 个连续 lane。
# 配合 speed=100000，代码会算出每 lane 为 25.78125G。
plp_profile_1_speed_100000_split_1.0:lanemap_line=0xF

# system side lane bitmask。
# 与 line side 相同，表示这是一个 4lane passthrough 端口，而不是 gearbox/reverse-gearbox。
plp_profile_1_speed_100000_split_1.0:lanemap_sys=0xF

# system side 强制 NR 位图。
# 当前不强制，保持为 0。
plp_profile_1_speed_100000_split_1.0:force_nr_sys=0x0

# line side 强制 NR 位图。
# 当前不强制，保持为 0。
plp_profile_1_speed_100000_split_1.0:force_nr_line=0x0

# system side 强制 ER 位图。
# 当前不强制，保持为 0。
plp_profile_1_speed_100000_split_1.0:force_er_sys=0x0

# line side 强制 ER 位图。
# 当前不强制，保持为 0。
plp_profile_1_speed_100000_split_1.0:force_er_line=0x0


# ====================
# PHY 列表
# ====================

# 需要初始化的 PHY 地址列表。
# sap_aperta_config_init() 会按该数组生成 g_bcm_phy_infos。
# 当前只有一颗 PHY，地址为 0x30。
plp_phy_addrs=0x30

# ====================
# PHY 0x30 的基础属性
# PHY地址确认方法：
#    bus_id = (phy_addr & 0x7c00)>>10;
#    mdio_index = (phy_addr & 0x3e0)>>5;
#    phy_addr = phy_addr & 0x1f;
#    return dfd_utest_mdiodev_rd(mdio_index+bus_id, phy_addr, reg_addr, data);
# ====================

# PHY 绑定到哪个 unit。
# sap_slot_init() 会按 unit 和 card_id 过滤，决定该 PHY 是否参与当前轮初始化。
plp_phy_unit_id:0x30=0

# PHY 所属 card/slot 编号。
# 与外层 slot_id 匹配时才初始化该 PHY。
plp_phy_card_id:0x30=0

# 该 PHY 使用哪个 mdio_id。
# 代码会再用这个 mdio_id 去查 plp_mdio_accs_type:<mdio_id>。
plp_phy_mdio_id:0x30=1

# PHY 芯片名。
# 对这版 81394 代码来说属于兼容字段，因为 chip_name 实际在源码里被写死为 "aperta"，
# 这里即使修改也不会改变驱动使用的芯片名。
plp_phy_chip_name:0x30=aperta

# MACsec 选项。
# 当前 81394 文件中只读取并保存到 phy_info->macsec_option，未看到后续直接使用点。
# 因此这里更像预留字段。
plp_phy_macsec_option:0x30=0x0

# PTP 选项。
# 与 macsec_option 类似，目前仅解析保存，未在 81394 主流程中消费。
plp_phy_ptp_option:0x30=0x0

# 该 PHY 采用哪个初始化 profile。
# 后续所有 plp_profile_1_* 键名中的 1 都是由这里决定的。
plp_phy_init_profile_id:0x30=1

# Profile 1 下，该 PHY 的 lane 列表。
# 这里改成 0,1,2,3，不是表示 4 个独立逻辑端口，
# 而是为了让 phy_info->lane_num = 4，从而使代码计算出的 split_num = 1。
# 实际创建的逻辑端口数量仍由下一行 init_ports 决定。
plp_profile_1_init_lanes:0x30=0-3

# Profile 1 下，该 PHY 对外呈现的逻辑端口号列表。
# 改成只创建一个逻辑端口 port 1，用来承载 1x100G 模块。
plp_profile_1_init_ports:0x30=1

# Profile 1 下，每个逻辑端口占用的 lane 数。
# 改成单个端口占用 4 条 lane。
plp_profile_1_init_ports_lane_num:0x30=4

# Profile 1 下，每个逻辑端口的初始 speed。
# 改成单个端口 100000 Mbps，即 100G。
plp_profile_1_init_speed_mode:0x30=100000

# ====================
# PHY 0x30 的全局 lane swap 与极性配置
# 这些键作用于整颗 PHY，而不是某个单端口。
# ====================

# system side TX 线序映射。
# 该值会被当作 8 个 nibble 逐 lane 解析，
# lane_map_tx[lane_index] = GET_LANE_SWAP_OCTAL(value, lane_index)。
# 0x76543210 表示逻辑上 0->0, 1->1, 2->2 ... 7->7，属于恒等映射。
plp_phy_tx_lane_map_sys:0x30=0x76543210

# system side RX 线序映射。
# 当前同样为恒等映射。
plp_phy_rx_lane_map_sys:0x30=0x76543210

# line side TX 线序映射。
# 0x76543120 表示 line 侧存在一组 lane 对调，不再是完全直通；
# 代码会在 sap_aperta_phy_init() 中调用 bcm_plp_rxtx_laneswap_set() 下发。
plp_phy_tx_lane_map_line:0x30=0x76542301

# line side RX 线序映射。
# 当前与 TX 相同，表示 RX/TX 两个方向都按同一套 line 侧交换规则处理。
plp_phy_rx_lane_map_line:0x30=0x76542301

# line side TX 极性翻转位图。
# sap_aperta_phy_init() 会先读出当前极性，再与此值做 XOR 后写回。
# 因此 bit=1 表示翻转对应 lane 的极性，0 表示保持不变。
# 当前 0x0 表示 line side TX 不翻转。
plp_tx_polarity_flip_line:0x30=0x0

# line side RX 极性翻转位图。
# 当前 0x0 表示 line side RX 不翻转。
plp_rx_polarity_flip_line:0x30=0xF

# system side TX 极性翻转位图。
# 当前 0x0 表示 system side TX 不翻转。
plp_tx_polarity_flip_sys:0x30=0x0

# system side RX 极性翻转位图。
# 当前 0x0 表示 system side RX 不翻转。
plp_rx_polarity_flip_sys:0x30=0x0
