#
# BCM78800 16x800g port configuration.
#
# configuration yaml file
#   device:
#       <unit>:
#           <table>:
#               ?
#                   <key_fld_1>: <value>
#                   <key_fld_2>: <value>
#                   ...
#                   <key_fld_n>: <value>
#               :
#                   <data_fld_1>: <value>
#                   <data_fld_2>: <value>
#                   ...
#                   <data_fld_n>: <value>
#
---
bcm_device:
    0:
        global:
            l2_table_default_view: 1
            pktio_mode: 1
            vlan_flooding_l2mc_num_reserved: 0
            shared_block_mask_section: uc_bc
            ctr_evict_enable: 0
            uat_mode: 1
            uft_mode: 4
            l3_alpm2_default_route_data_mode: 0
            l3_reduced_route_max_ecmp_group_index: 4095
            #sai_brcm_sonic_acl_enhancements: 1
            sai_tunnel_support: 1
            multi_network_groups: 1
            use_all_splithorizon_groups: 1
            riot_enable: 1
            riot_overlay_l3_intf_mem_size: 8192
            riot_overlay_l3_egress_mem_size: 32768
            riot_overlay_ecmp_resilient_hash_size: 16384
            sai_field_group_auto_prioritize: 1
            sai_modify_hash_flexdigest: 1
            sai_fast_convergence_support: 1
            sai_disable_ports_when_sw_shutdown: 1
            sai_disable_internal_port_serdes: 1
            pfc_deadlock_seq_control: 1
            flexctr_action_reserved_ipmc_hitbit: 1
            l3_ecmp_levels: 2
            bcm_tunnel_term_compatible_mode: 1
            #sai_stats_disable_mask: 0xffff
            sai_port_phy_time_sync_en: 1
            max_vp_lags: 1024
            max_vp_lags_underlay: 64
            sai_verify_incoming_chksum: 0
            ipmc_age_mode: 1
            mirror_dest_cosq_mode: 1
...
---
bcm_device:
    0:
        global:
            ftem_mem_entries: 65536
...
---
bcm_device:
    0:
        global:
            flowtracker_enable: 1
            flowtracker_hardware_learn_enable: 2
            flowtracker_flexctr_alloc_enable: 1
            flowtracker_drop_monitor_enable: 1
            flowtracker_max_flows: 32768
...
---         
bcm_device:
    0:
        global:
            global_flexctr_ing_action_num_reserved: 32
            global_flexctr_ing_pool_num_reserved: 20
            global_flexctr_ing_op_profile_num_reserved: 10
            global_flexctr_ing_group_num_reserved: 2
            global_flexctr_egr_action_num_reserved: 8
            global_flexctr_egr_pool_num_reserved: 8
            global_flexctr_egr_op_profile_num_reserved: 10
            global_flexctr_egr_group_num_reserved: 1
...
