                PC_PHYS_PORT_ID: 145
            ?
                PORT_ID: 166 #PM 19
            :
                PC_PHYS_PORT_ID: 153
            ?
                PORT_ID: 64 #dp2 (< 100G) (>100G  + dp7)
            :
                # management port
                PC_PHYS_PORT_ID: 161
            ?
                PORT_ID: 174 #dp2 (< 100G) (>100G  + dp7)
            :
                # management port
                PC_PHYS_PORT_ID: 162                
...
---
device:
    0:
        PC_PORT:
            ?
                PORT_ID: 0
            :
                ENABLE: 1
                SPEED: 10000
                NUM_LANES: 1
                MAX_FRAME_SIZE: 0x24c8
            ?
                PORT_ID: [1, 9,
                          26, 34,
                          132, 140,
                          158, 166]
            :
                ENABLE: 1
                SPEED: 800000
                NUM_LANES: 8
                FEC_MODE: PC_FEC_RS544_2XN
                MAX_FRAME_SIZE: 9416
                LINK_TRAINING: 0
            ?
                PORT_ID: [17, 22, 44, 48,
                          52, 56, 60, 66,
                          70, 74, 78, 82,
                          88, 92, 96, 100,
                          104, 110, 114, 118,
                          122, 126, 148, 154]
            :
                ENABLE: 1
                SPEED: 400000
                NUM_LANES: 4
                FEC_MODE: PC_FEC_RS544_2XN
                MAX_FRAME_SIZE: 9416
                LINK_TRAINING: 0
            ?
                PORT_ID: [64, 174]     # Management port 0 (Pipe 2)
            :
                ENABLE: 1
                SPEED: 25000
                NUM_LANES: 1
                MAX_FRAME_SIZE: 9416
...
---
device:
    0:
        PC_PMD_FIRMWARE:
            ?
                PORT_ID: [1, 9,
                          26, 34,
                          132, 140,
                          158, 166]
            :
                MEDIUM_TYPE_AUTO: 1
                CL72_RESTART_TIMEOUT_EN_AUTO: 0
                CL72_RESTART_TIMEOUT_EN: 1
            ?
                PORT_ID: [17, 22, 44, 48,
                          52, 56, 60, 66,
                          70, 74, 78, 82,
                          88, 92, 96, 100,
                          104, 110, 114, 118,
                          122, 126, 148, 154]
            :
                MEDIUM_TYPE_AUTO: 1
                CL72_RESTART_TIMEOUT_EN_AUTO: 0
                CL72_RESTART_TIMEOUT_EN: 1                    
...
---
device:
    0:
        FP_CONFIG:
            FP_EM_ENTRY_TO_REMOTE_ID_MAPS_ENABLE: 1
            FP_ING_ENTRY_TO_REMOTE_ID_MAPS_ENABLE: 1
            FP_VLAN_ENTRY_TO_REMOTE_ID_MAPS_ENABLE: 1
            FP_EGR_ENTRY_TO_REMOTE_ID_MAPS_ENABLE: 1
...
---
device:
    0:
        CTR_CONTROL:
            INTERVAL: 500000
            MULTIPLIER_TM: 2
            MULTIPLIER_IPIPE: 2
            MULTIPLIER_EPIPE: 2
            MULTIPLIER_PORT: 2
            MULTIPLIER_EVICT: 1
...
