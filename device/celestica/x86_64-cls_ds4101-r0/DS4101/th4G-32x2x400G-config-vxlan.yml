#
# configuration yaml file
#   device:
#       <unit>:
#           <table>:
#               ?
#                   <key_fld_1>: <value>
#                   <key_fld_2>: <value>
#                   ...
#                   <key_fld_n>: <value>
#               :
#                   <data_fld_1>: <value>
#                   <data_fld_2>: <value>
#                   ...
#                   <data_fld_n>: <value>
#
---
bcm_device:
    0:
        global:
            uft_mode: 1
            l3_alpm_template: 1
            l2_learn_enable: 1
            pktio_mode: 1
            sai_port_phy_time_sync_en: 1
            sai_field_group_auto_prioritize: 1
            sai_tunnel_support: 1
            skip_protocol_default_entries: 1
            shared_block_mask_section: uc_bc
            ipv6_lpm_128b_enable: 1
            vlan_default_port: 3
            vlan_flooding_l2mc_num_reserved: 0
            bcm_tunnel_term_compatible_mode: 1
            sai_tunnel_vxlan_scale: 1
            sai_fdb_entry_l2_discard_src_enable: 1
            #UDF Hash support
            sai_l3_byte1_udf_disable: 1
            sai_rdma_udf_disable: 1
            sai_common_hash_crc: 1
            sai_pfc_dlr_init_capability: 1
            pfc_dld_granularity_adapt_enable: 1
            pfc_deadlock_seq_control: 1
            #sai_svi_my_station_optimization: 1
            stat_custom_receive0_management_mode: 1
            sai_tunnel_vxlan_scale: 1
            shared_l2_tunnel: 1
            l3_ecmp_member_first_lkup_mem_size: 4096
            riot_overlay_l3_egress_mem_size: 16384
            riot_overlay_l3_intf_mem_size: 4096
            sai_skip_create_sys_efp_grp: 1

...
