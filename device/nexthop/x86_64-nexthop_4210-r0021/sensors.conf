# libsensors configuration file 
# ----------------------------------------------
#
bus "i2c-97" "xiic-i2c xiic-i2c"
bus "i2c-98" "xiic-i2c xiic-i2c"
bus "i2c-168" "i2c-100-mux (chan_id 1)"
bus "i2c-172" "i2c-101-mux (chan_id 1)"


chip "nh_tmp464-*"
    label temp1 "Switch Card Lower Rear"
    label temp2 "PSU 2 Intake"
    label temp3 "ASIC Diode 0"
    label temp4 "ASIC Diode 1"
    label temp5 "ASIC Diode 2"

    # In HW vs kernel driver, max/crit are swapped.
    set temp1_crit 87
    set temp1_max 125
    set temp2_crit 55
    set temp2_max 125
    set temp3_crit 115
    set temp3_max 122
    set temp4_crit 115
    set temp4_max 122
    set temp5_crit 115
    set temp5_max 122
    ignore temp6
    ignore temp7
    ignore temp8
    ignore temp9

chip "tmp451-*"
    label temp2 "Chassis Intake"
    
    set temp2_max 45
    set temp2_crit 65

# Note: k10temp driver does not support writing max/crit values, so we rely on
# pddf-device.json to provide the values instead.
chip "k10temp-pci-*"
    label temp1 "CPU"

# The NVME drive doesn't populate min and max temps for these sensors, ignore
# them to not get I/O errors.
chip "nvme-pci-*"
    ignore temp2
    ignore temp3
    ignore temp4

chip "nh_xdpe1a2g5b-*"
    set temp1_max 120
    set temp1_crit 130

chip "nh_raa228244-*"
    set temp1_max 120
    set temp1_crit 130

# Feedback divider compensation for the 3.3V rails (1/1.2). Currently inert on
# libsensors 3.6.0 due to a compute-routing bug for PMBus-labelled features;
# the fix landed in 3.6.1, so these become live on the next libsensors bump.
# PDDF already scales these rails in pddf-device.json, so `show platform
# voltage` is already correct.
chip "nh_raa228244-i2c-97-72"
    compute in3 @*(1.2), @/(1.2)

chip "nh_raa228244-i2c-98-72"
    compute in3 @*(1.2), @/(1.2)

chip "nh_raa228244-i2c-168-62"
    compute in3 @*(1.2), @/(1.2)
    compute in4 @*(1.2), @/(1.2)

chip "nh_raa228244-i2c-172-62"
    compute in3 @*(1.2), @/(1.2)
    compute in4 @*(1.2), @/(1.2)
