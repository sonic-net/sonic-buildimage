# Static Analysis Preparation Pipeline
#
# Prepares a clean sonic-buildimage workspace with all submodules and
# externally-fetched source trees fully initialized, ready for static
# code analysis tools (bandit, semgrep, pylint, etc.).
# No build is performed.

trigger:
  branches:
    include:
      - master
      - 202*

pr:
  branches:
    include:
      - master
      - 202*

pool:
  vmImage: 'ubuntu-22.04'

steps:
  - checkout: self
    clean: true
    submodules: recursive
    fetchDepth: 0

  - script: |
      set -e
      git submodule sync --recursive
      git submodule foreach --recursive 'git clean -xfdf || true'
      git submodule foreach --recursive 'git reset --hard || true'
      git submodule update --init --recursive
    displayName: 'Reset and sync submodules'

  # External source trees fetched via git clone at build time.
  # Clone them here so static analysis tools can see the full codebase.
  - script: |
      set -e

      # libyang C library (version pinned in rules/libyang.mk)
      LIBYANG_VERSION=1.0.73
      if [ ! -d src/libyang/libyang-${LIBYANG_VERSION} ]; then
        git clone --depth 1 --branch v${LIBYANG_VERSION} \
          https://github.com/CESNET/libyang.git \
          src/libyang/libyang-${LIBYANG_VERSION}
      fi

      # flashrom (version pinned in rules/flashrom.mk)
      FLASHROM_VERSION=1.4.0
      if [ ! -d src/flashrom/flashrom-${FLASHROM_VERSION} ]; then
        git clone --depth 1 --branch v${FLASHROM_VERSION} \
          https://github.com/flashrom/flashrom.git \
          src/flashrom/flashrom-${FLASHROM_VERSION}
      fi

      # libpsample (Mellanox sflow)
      if [ ! -d src/sflow/libpsample ]; then
        git clone --depth 1 https://github.com/Mellanox/libpsample.git \
          src/sflow/libpsample
      fi

      # librdb (redis rdb-cli)
      if [ ! -d src/rdb-cli/librdb ]; then
        git clone --depth 1 https://github.com/redis/librdb.git \
          src/rdb-cli/librdb
      fi

      # oc-pyang (openconfig YANG tools, used by sonic-mgmt-common)
      if [ ! -d src/sonic-mgmt-common/models/yang/oc-pyang ]; then
        git clone --depth 1 https://github.com/openconfig/oc-pyang.git \
          src/sonic-mgmt-common/models/yang/oc-pyang
      fi
    displayName: 'Clone external source trees'

  # External source trees fetched via wget/tarball at build time.
  - script: |
      set -e

      # ifupdown2 (fetched via wget in src/ifupdown2/Makefile)
      # Version may contain dashes (e.g. 3.0.0-1); tarball extracts to ifupdown2-<version>/
      IFUPDOWN2_VERSION=$(grep '^IFUPDOWN2_VERSION' rules/ifupdown2.mk 2>/dev/null | head -1 | cut -d= -f2 | tr -d ' ')
      if [ -n "$IFUPDOWN2_VERSION" ]; then
        if [ ! -d "src/ifupdown2/ifupdown2-${IFUPDOWN2_VERSION}" ]; then
          echo "Fetching ifupdown2 ${IFUPDOWN2_VERSION}..."
          curl -sL \
            "https://github.com/CumulusNetworks/ifupdown2/archive/${IFUPDOWN2_VERSION}.tar.gz" \
            -o /tmp/ifupdown2.tar.gz
          tar -xzf /tmp/ifupdown2.tar.gz -C src/ifupdown2/
        else
          echo "ifupdown2 ${IFUPDOWN2_VERSION} already present"
        fi
      fi

      # kdump-tools (fetched via apt source in src/kdump-tools/Makefile)
      KDUMP_VERSION=$(grep '^KDUMP_TOOLS_VERSION' rules/kdump-tools.mk 2>/dev/null | head -1 | cut -d= -f2 | tr -d ' ')
      if [ -n "$KDUMP_VERSION" ]; then
        if [ ! -d "src/kdump-tools/kdump-tools-${KDUMP_VERSION}" ]; then
          echo "Fetching kdump-tools ${KDUMP_VERSION} source..."
          cd src/kdump-tools
          apt-get source kdump-tools=${KDUMP_VERSION} 2>/dev/null || \
            curl -sL "http://deb.debian.org/debian/pool/main/k/kdump-tools/kdump-tools_${KDUMP_VERSION}.tar.xz" \
              -o /tmp/kdump-tools.tar.xz && tar -xJf /tmp/kdump-tools.tar.xz -C . 2>/dev/null || true
          cd -
        else
          echo "kdump-tools ${KDUMP_VERSION} already present"
        fi
      fi
    displayName: 'Fetch external source tarballs'

  # Apply patches that are tracked in the repo but not yet applied
  # (these are applied during the build; apply them here for analysis).
  - script: |
      set -e

      apply_patches() {
        local dir="$1"
        local patch_dir="$2"
        if [ ! -d "$dir" ] || [ ! -d "$patch_dir" ]; then
          echo "  SKIP: $dir (dir or patch_dir missing)"
          return
        fi
        local count=$(ls "$patch_dir"/*.patch 2>/dev/null | wc -l)
        echo "  $dir: $count patches"
        pushd "$dir" > /dev/null
        for p in $(ls "$OLDPWD/$patch_dir"/*.patch 2>/dev/null | sort); do
          git apply --whitespace=nowarn "$p" 2>/dev/null \
            && echo "    OK: $(basename $p)" \
            || echo "    SKIP (already applied): $(basename $p)"
        done
        popd > /dev/null
      }

      # bash patches
      BASH_DIR=$(ls -d src/bash/bash-* 2>/dev/null | head -1)
      [ -n "$BASH_DIR" ] && apply_patches "$BASH_DIR" "src/bash/patches" \
        || echo "  SKIP: bash source dir not found"

      # dhcprelay patches
      apply_patches src/dhcprelay/dhcp4relay src/dhcprelay/dhcp4relay/patch

      # kdump-tools patches
      KDUMP_DIR=$(ls -d src/kdump-tools/kdump-tools-* 2>/dev/null | head -1)
      [ -n "$KDUMP_DIR" ] && apply_patches "$KDUMP_DIR" "src/kdump-tools/patch" \
        || echo "  SKIP: kdump-tools source dir not found"

      # libnl3 patches
      LIBNL3_VERSION=$(grep '^LIBNL3_VERSION' rules/libnl3.mk 2>/dev/null | head -1 | cut -d= -f2 | tr -d ' ')
      [ -n "$LIBNL3_VERSION" ] && apply_patches "src/libnl3/libnl3-${LIBNL3_VERSION}" "src/libnl3/patch" \
        || echo "  SKIP: libnl3 version not found"
    displayName: 'Apply source patches'

  - script: |
      echo "=== Workspace summary ==="
      echo "Submodule count: $(git submodule status --recursive | wc -l)"
      echo "Python files:    $(find . -name '*.py' \
        -not -path './.git/*' -not -path './target/*' -not -path './fsroot*' \
        -not -path './dpkg/*' 2>/dev/null | wc -l)"
      echo "C/C++ files:     $(find . \( -name '*.[ch]' -o -name '*.cpp' -o -name '*.hpp' \) \
        -not -path './.git/*' -not -path './target/*' -not -path './fsroot*' \
        -not -path './dpkg/*' 2>/dev/null | wc -l)"
      echo "Go files:        $(find . -name '*.go' \
        -not -path './.git/*' -not -path './target/*' 2>/dev/null | wc -l)"
    displayName: 'Workspace summary'

  # Publish source tree for downstream analysis jobs.
  # Excludes large non-Python/non-SONiC dirs that are not analysis targets:
  #   p4lang             - 23 GB C++ compiler infrastructure, platform-specific
  #   sonic-linux-kernel - kernel source, not SONiC code
  #   grub2              - bootloader, pure C, Debian CVE patches only
  #   sonic-device-data  - platform JSON/config data, no code
  - script: |
      set -e
      DEST=$(Agent.TempDirectory)/sonic-buildimage-source
      mkdir -p $DEST
      rsync -a --delete \
        --exclude='.git' \
        --exclude='target/' \
        --exclude='fsroot*' \
        --exclude='dpkg/' \
        --exclude='src/p4lang/' \
        --exclude='src/sonic-linux-kernel/' \
        --exclude='src/grub2/' \
        --exclude='src/sonic-device-data/' \
        ./ $DEST/
      echo "Artifact size: $(du -sh $DEST | cut -f1)"
    displayName: 'Stage source tree for publish'

  - publish: $(Agent.TempDirectory)/sonic-buildimage-source
    artifact: sonic-buildimage-source
    displayName: 'Publish source tree for analysis jobs'
