# Static Analysis Preparation Pipeline
#
# Prepares a clean sonic-buildimage workspace with all submodules and
# externally-fetched source trees fully initialized, ready for static
# code analysis tools (bandit, semgrep, pylint, etc.).
# No build is performed.

trigger:
  branches:
    include:
      - master
      - 202*

pr:
  branches:
    include:
      - master
      - 202*

pool:
  vmImage: 'ubuntu-22.04'

steps:
  - checkout: self
    clean: true
    submodules: recursive
    fetchDepth: 1

  - script: |
      set -e
      # Sync submodule remote URLs (catches cases where .gitmodules URLs changed)
      git submodule sync --recursive
      git submodule update --init --recursive
    displayName: 'Sync submodules'

  # External source trees fetched via git clone at build time.
  - script: |
      set -e

      # flashrom
      FLASHROM_VERSION=$(make -f - --no-print-directory 2>/dev/null \
        include\ rules/flashrom.mk$'\nprint-%: ; @echo $($*)' print-FLASHROM_VERSION_FULL \
        <<< 'include rules/flashrom.mk
print-%: ; @echo $($*)' || grep '^FLASHROM_VERSION_FULL\b' rules/flashrom.mk | head -1 | cut -d= -f2 | tr -d ' ')
      if [ ! -d "src/flashrom/flashrom-${FLASHROM_VERSION}" ]; then
        git clone --depth 1 --branch "v${FLASHROM_VERSION}" \
          https://github.com/flashrom/flashrom.git \
          "src/flashrom/flashrom-${FLASHROM_VERSION}"
      fi

      # libpsample (Mellanox sflow)
      [ ! -d src/sflow/libpsample ] && \
        git clone --depth 1 https://github.com/Mellanox/libpsample.git src/sflow/libpsample

      # librdb (redis rdb-cli)
      [ ! -d src/rdb-cli/librdb ] && \
        git clone --depth 1 https://github.com/redis/librdb.git src/rdb-cli/librdb

      # oc-pyang (openconfig YANG tools, used by sonic-mgmt-common)
      [ ! -d src/sonic-mgmt-common/models/yang/oc-pyang ] && \
        git clone --depth 1 https://github.com/openconfig/oc-pyang.git \
          src/sonic-mgmt-common/models/yang/oc-pyang

      # libyang v1 — Makefile uses git clone + tag, not dget
      LIBYANG_VERSION=1.0.73
      if [ ! -d "src/libyang/libyang-${LIBYANG_VERSION}" ]; then
        git clone --depth 1 --branch v1.0-r4 \
          https://github.com/CESNET/libyang.git \
          "src/libyang/libyang-${LIBYANG_VERSION}"
      fi
    displayName: 'Clone external source trees'

  # Packages fetched via dget or wget at build time, with in-tree SONiC patches.
  # Auto-discovers all src/ and platform/ Makefiles that use dget and have patches.
  # Rules .mk files are found by convention: rules/<pkg>.mk or <parent>/<pkg>.mk.
  - script: |
      set -e
      sudo apt-get install -y -q devscripts

      # resolve_dget_url DIR [EXTRA_MK]
      # Reads the dget URL template from DIR/Makefile, expands Make variables
      # by including the corresponding rules .mk, and prints the resolved .dsc URL.
      resolve_dget_url() {
        local dir="$1" extra_mk="${2:-}"
        local pkg_mk="$dir/Makefile"
        local basename
        basename=$(basename "$dir")
        # Find corresponding rules .mk: rules/<pkg>.mk or <parent>/<pkg>.mk
        local rules_mk
        if [ -f "rules/${basename}.mk" ]; then
          rules_mk="rules/${basename}.mk"
        else
          rules_mk="$(dirname $dir)/${basename}.mk"
        fi
        local raw
        raw=$(grep '\bdget\b' "$pkg_mk" | head -1 \
          | sed 's/.*dget[[:space:]]*//' | sed 's/^-u[[:space:]]*//' | tr -d '\t')
        local includes="include $rules_mk"
        [ -n "$extra_mk" ] && includes="$includes
include $extra_mk"
        make -f - --no-print-directory 2>/dev/null <<MAKEFILE | grep -oE 'https?://[^ ]+\.dsc' | head -1
$includes
BUILD_PUBLIC_URL ?= https://packages.trafficmanager.net/public
_x := $raw
resolve: ; @echo \$(_x)
MAKEFILE
      }

      # fetch_dget DIR
      # Fetches source via dget if not already present.
      # If URL resolution fails with rules .mk alone, retries with the package
      # Makefile also included (handles cases like lldpd/libyang3 where URL vars
      # are defined in the package Makefile, not the rules .mk).
      fetch_dget() {
        local dir="$1"
        local url
        url=$(resolve_dget_url "$dir")
        # Retry with package Makefile included if variables unresolved
        if [ -z "$url" ]; then
          url=$(resolve_dget_url "$dir" "$dir/Makefile")
        fi
        if [ -z "$url" ]; then
          echo "  SKIP $dir: could not resolve dget URL"
          return
        fi
        # Check if any source dir already exists under $dir
        local existing
        existing=$(find "$dir" -mindepth 1 -maxdepth 1 -type d \
          ! -name patch ! -name patches ! -name debian ! -name '.git' \
          2>/dev/null | head -1)
        if [ -n "$existing" ]; then
          echo "  EXISTS: $dir ($(basename $existing))"
          return
        fi
        echo "  Fetching $dir from $url"
        cd "$dir"
        dget -u "$url"
        cd -
      }

      # ifupdown2 (wget tarball, not dget — no rules .mk pattern applies)
      IFUPDOWN2_VERSION=$(grep '^IFUPDOWN2_VERSION' rules/ifupdown2.mk | head -1 | cut -d= -f2 | tr -d ' ')
      if [ -n "$IFUPDOWN2_VERSION" ] && [ ! -d "src/ifupdown2/ifupdown2-${IFUPDOWN2_VERSION}" ]; then
        echo "  Fetching ifupdown2 ${IFUPDOWN2_VERSION}..."
        curl -sL "https://github.com/CumulusNetworks/ifupdown2/archive/${IFUPDOWN2_VERSION}.tar.gz" \
          -o /tmp/ifupdown2.tar.gz
        tar -xzf /tmp/ifupdown2.tar.gz -C src/ifupdown2/
      fi

      # Auto-discover all Makefiles with dget + in-tree patches
      find src platform/mellanox -name Makefile 2>/dev/null | sort | while read mk; do
        dir=$(dirname "$mk")
        # Skip if this is a nested Makefile inside an already-unpacked source tree
        # (identified by having a parent dir that is itself under src/<pkg>/)
        depth=$(echo "$dir" | tr -cd '/' | wc -c)
        [ "$depth" -gt 2 ] && continue
        grep -q '\bdget\b' "$mk" || continue
        patch_count=$(find "$dir/patch" "$dir/patches" 2>/dev/null -name "*.patch" 2>/dev/null | wc -l)
        [ "$patch_count" -eq 0 ] && continue
        fetch_dget "$dir"
      done
    displayName: 'Fetch external source trees (dget/tarball)'

  # Apply in-tree SONiC patches to all fetched source trees.
  - script: |
      set -e

      apply_patches() {
        local src_dir="$1" patch_dir="$2"
        [ ! -d "$src_dir" ] || [ ! -d "$patch_dir" ] && return
        local count
        count=$(ls "$patch_dir"/*.patch 2>/dev/null | wc -l)
        [ "$count" -eq 0 ] && return
        echo "  $src_dir: $count patches"
        pushd "$src_dir" > /dev/null
        for p in $(ls "$OLDPWD/$patch_dir"/*.patch 2>/dev/null | sort); do
          git apply --whitespace=nowarn "$p" 2>/dev/null \
            && echo "    OK: $(basename $p)" \
            || echo "    SKIP (already applied): $(basename $p)"
        done
        popd > /dev/null
      }

      # Auto-discover all dirs with in-tree patches and apply them to the
      # corresponding unpacked source subdirectory.
      find src platform/mellanox -mindepth 1 -maxdepth 2 \
          \( -name patch -o -name patches \) -type d 2>/dev/null | sort | while read patch_dir; do
        patch_count=$(ls "$patch_dir"/*.patch 2>/dev/null | wc -l)
        [ "$patch_count" -eq 0 ] && continue
        parent=$(dirname "$patch_dir")
        # Find the unpacked source subdir (not patch/patches/debian/.git)
        src_dir=$(find "$parent" -mindepth 1 -maxdepth 1 -type d \
          ! -name patch ! -name patches ! -name debian ! -name '.git' \
          2>/dev/null | sort | head -1)
        [ -z "$src_dir" ] && echo "  SKIP $parent: no source dir" && continue
        apply_patches "$src_dir" "$patch_dir"
      done
    displayName: 'Apply source patches'

  - script: |
      echo "=== Workspace summary ==="
      echo "Submodule count: $(git submodule status --recursive | wc -l)"
      echo "Python files:    $(find . -name '*.py' \
        -not -path './.git/*' -not -path './target/*' -not -path './fsroot*' \
        -not -path './dpkg/*' 2>/dev/null | wc -l)"
      echo "C/C++ files:     $(find . \( -name '*.[ch]' -o -name '*.cpp' -o -name '*.hpp' \) \
        -not -path './.git/*' -not -path './target/*' -not -path './fsroot*' \
        -not -path './dpkg/*' 2>/dev/null | wc -l)"
      echo "Go files:        $(find . -name '*.go' \
        -not -path './.git/*' -not -path './target/*' 2>/dev/null | wc -l)"
    displayName: 'Workspace summary'

  # Publish source tree for downstream analysis jobs.
  # Excludes large dirs with no SONiC code (no patches, pure upstream C):
  #   p4lang             - 23 GB C++ compiler infrastructure
  #   sonic-linux-kernel - kernel source
  #   grub2              - bootloader, pure C, no SONiC patches
  #   sonic-device-data  - platform JSON/config data, no code
  - script: |
      set -e
      DEST=$(Agent.TempDirectory)/sonic-buildimage-source
      mkdir -p "$DEST"
      rsync -a --delete \
        --exclude='.git' \
        --exclude='target/' \
        --exclude='fsroot*' \
        --exclude='dpkg/' \
        --exclude='src/p4lang/' \
        --exclude='src/sonic-linux-kernel/' \
        --exclude='src/grub2/' \
        --exclude='src/sonic-device-data/' \
        ./ "$DEST"/
      echo "Artifact size: $(du -sh "$DEST" | cut -f1)"
    displayName: 'Stage source tree for publish'

  - publish: $(Agent.TempDirectory)/sonic-buildimage-source
    artifact: sonic-buildimage-source
    displayName: 'Publish source tree for analysis jobs'
