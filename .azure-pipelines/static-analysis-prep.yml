# Static Analysis Preparation Pipeline
#
# Prepares a clean sonic-buildimage workspace with all submodules and
# externally-fetched source trees fully initialized, ready for static
# code analysis tools (bandit, semgrep, pylint, etc.).
# No build is performed.

trigger:
  branches:
    include:
      - master
      - 202*

pr:
  branches:
    include:
      - master
      - 202*

pool:
  vmImage: 'ubuntu-22.04'

steps:
  - checkout: self
    clean: true
    submodules: recursive
    fetchDepth: 1

  - script: |
      set -e
      # Sync submodule remote URLs (catches cases where .gitmodules URLs changed)
      git submodule sync --recursive
      git submodule update --init --recursive
    displayName: 'Sync submodules'

  # Fetch all external source trees that are obtained via git clone at build time.
  # Auto-discovers packages by scanning Makefiles for git clone commands.
  # Only fetches packages that have in-tree SONiC patches (patch/ or patches/ dirs).
  # Version tags and URLs are resolved dynamically from rules/*.mk — no hardcoded values.
  - script: |
      set -e

      # resolve_make_var RULES_MK VAR [EXTRA_VAR_DEFS]
      # Resolves a Make variable by including the given .mk file.
      resolve_make_var() {
        local rules_mk="$1" var="$2" extra="${3:-}"
        make -f - --no-print-directory 2>/dev/null <<MAKEFILE | tr -d ' \n'
include $rules_mk
BUILD_PUBLIC_URL ?= https://packages.trafficmanager.net/public
$extra
resolve: ; @echo \$($var)
MAKEFILE
      }

      # fetch_git_clone PARENT_DIR URL DEST_SUBDIR [BRANCH_OR_TAG]
      fetch_git_clone() {
        local parent="$1" url="$2" dest="$3" ref="${4:-}"
        if [ -d "$parent/$dest" ]; then
          echo "  EXISTS: $parent/$dest"; return
        fi
        echo "  Cloning $(basename $dest) from $url${ref:+ @ $ref}"
        git clone --depth 1 ${ref:+--branch "$ref"} "$url" "$parent/$dest" 2>&1 | tail -2
      }

      # --- Packages with in-tree SONiC patches ---

      # flashrom: rules/flashrom.mk defines FLASHROM_VERSION_FULL
      VER=$(resolve_make_var rules/flashrom.mk FLASHROM_VERSION_FULL)
      fetch_git_clone src/flashrom https://github.com/flashrom/flashrom.git \
        "flashrom-${VER}" "v${VER}"

      # grub2: rules/grub2.mk defines GRUB2_VERSION; tag is debian/<version>
      VER=$(resolve_make_var rules/grub2.mk GRUB2_VERSION)
      fetch_git_clone src/grub2 https://salsa.debian.org/grub-team/grub.git \
        "grub2" "debian/${VER}"

      # libyang v1: rules/libyang.mk defines LIBYANG_VERSION; Makefile hardcodes tag v1.0-r4
      VER=$(resolve_make_var rules/libyang.mk LIBYANG_VERSION)
      fetch_git_clone src/libyang https://github.com/CESNET/libyang.git \
        "libyang-${VER}" "v1.0-r4"

      # libyang3-py3: tag hardcoded in Makefile as v3.1.0
      fetch_git_clone src/libyang3-py3 https://github.com/CESNET/libyang-python.git \
        "libyang-python" "v3.1.0"

      # monit: rules/monit.mk defines MONIT_VERSION; tag is debian/1%<version>
      VER=$(resolve_make_var rules/monit.mk MONIT_VERSION)
      if [ ! -d src/monit/monit ]; then
        echo "  Cloning monit @ debian/1%${VER}"
        git clone --depth 50 https://salsa.debian.org/debian/monit.git src/monit/monit 2>&1 | tail -2
        cd src/monit/monit
        git reset --hard "debian/1%${VER}" 2>/dev/null || true
        cd -
      fi

      # --- No-patch git clones (no SONiC patches, needed for analysis coverage) ---

      fetch_git_clone src/sflow      https://github.com/Mellanox/libpsample.git libpsample
      fetch_git_clone src/rdb-cli    https://github.com/redis/librdb.git         librdb
      fetch_git_clone src/sonic-mgmt-common/models/yang \
                                     https://github.com/openconfig/oc-pyang.git  oc-pyang
    displayName: 'Clone external source trees'

  # Fetch all external source trees obtained via dget or wget at build time.
  # Auto-discovers packages by scanning Makefiles for dget/wget-dsc commands
  # where in-tree SONiC patches exist. URLs resolved from rules/*.mk dynamically.
  - script: |
      set -e
      sudo apt-get install -y -q devscripts

      # resolve_url_from_mk RULES_MK URL_TEMPLATE [EXTRA_VAR_DEFS]
      # Expands Make variables in URL_TEMPLATE using the given .mk file.
      resolve_url() {
        local rules_mk="$1" template="$2" extra="${3:-}"
        make -f - --no-print-directory 2>/dev/null <<MAKEFILE | grep -oE 'https?://[^ ]+\.dsc' | head -1
include $rules_mk
BUILD_PUBLIC_URL ?= https://packages.trafficmanager.net/public
$extra
_x := $template
resolve: ; @echo \$(_x)
MAKEFILE
      }

      # fetch_dsc DIR URL
      # Fetches a Debian source package via dget if no source dir exists yet.
      fetch_dsc() {
        local dir="$1" url="$2"
        local existing
        existing=$(find "$dir" -mindepth 1 -maxdepth 1 -type d \
          ! -name patch ! -name patches ! -name debian ! -name '.git' \
          2>/dev/null | head -1)
        if [ -n "$existing" ]; then
          echo "  EXISTS: $dir ($(basename $existing))"; return
        fi
        echo "  Fetching $(basename $dir) from $url"
        cd "$dir"; dget -u "$url"; cd -
      }

      # ifupdown2: wget tarball from GitHub (no .dsc)
      VER=$(grep '^IFUPDOWN2_VERSION' rules/ifupdown2.mk | head -1 | cut -d= -f2 | tr -d ' ')
      if [ -n "$VER" ] && [ ! -d "src/ifupdown2/ifupdown2-${VER}" ]; then
        echo "  Fetching ifupdown2 ${VER}..."
        curl -sL "https://github.com/CumulusNetworks/ifupdown2/archive/${VER}.tar.gz" \
          -o /tmp/ifupdown2.tar.gz
        tar -xzf /tmp/ifupdown2.tar.gz -C src/ifupdown2/
      fi

      # Auto-discover dget packages: Makefiles with \bdget\b + in-tree patches
      find src platform/mellanox -name Makefile 2>/dev/null | sort | while read mk; do
        dir=$(dirname "$mk")
        # Skip nested Makefiles inside already-unpacked source trees (depth > src/<pkg>)
        depth=$(echo "$dir" | tr -cd '/' | wc -c)
        [ "$depth" -gt 2 ] && continue
        grep -q '\bdget\b' "$mk" || continue
        patch_count=$(find "$dir/patch" "$dir/patches" 2>/dev/null -name "*.patch" | wc -l)
        [ "$patch_count" -eq 0 ] && continue

        # Derive rules .mk by convention: rules/<pkg>.mk or <parent>/<pkg>.mk
        pkg=$(basename "$dir")
        rules_mk="rules/${pkg}.mk"
        [ ! -f "$rules_mk" ] && rules_mk="$(dirname $dir)/${pkg}.mk"

        # Extract URL template from dget line
        tmpl=$(grep '\bdget\b' "$mk" | head -1 \
          | sed 's/.*dget[[:space:]]*//' | sed 's/^-u[[:space:]]*//' | tr -d '\t')

        url=$(resolve_url "$rules_mk" "$tmpl")
        # Retry including the package Makefile (for packages like lldpd/libyang3
        # where the URL uses variables defined in the package Makefile itself)
        if [ -z "$url" ]; then
          url=$(resolve_url "$rules_mk" "$tmpl" "include $mk")
        fi
        [ -z "$url" ] && echo "  SKIP $dir: could not resolve URL" && continue
        fetch_dsc "$dir" "$url"
      done

      # wget-dsc packages (use wget instead of dget, but .dsc URL is available)
      # iptables
      IPTABLES_URL=$(grep '^IPTABLES_URL' src/iptables/Makefile | cut -d= -f2 | tr -d ' \t')
      IPTABLES_VER=$(grep '^IPTABLES_VERSION ' rules/iptables.mk | cut -d= -f2 | tr -d ' ')
      IPTABLES_SUFFIX=$(grep '^IPTABLES_VERSION_SUFFIX' rules/iptables.mk | cut -d= -f2 | tr -d ' ')
      fetch_dsc src/iptables "${IPTABLES_URL}/iptables_${IPTABLES_VER}-${IPTABLES_SUFFIX}.dsc"

      # socat: URL in wget line with $(BUILD_PUBLIC_URL) — resolve via rules mk
      SOCAT_TMPL=$(grep '\bwget\b' src/socat/Makefile | grep '\.dsc' | head -1 \
        | grep -oP '"[^"]+\.dsc"' | tail -1 | tr -d '"')
      SOCAT_URL=$(resolve_url rules/socat.mk "$SOCAT_TMPL")
      [ -n "$SOCAT_URL" ] && fetch_dsc src/socat "$SOCAT_URL"

      # thrift: URL uses $(THRIFT_LINK_PRE) = $(BUILD_PUBLIC_URL)/debian
      THRIFT_VER=$(grep '^THRIFT_VERSION\s*=' src/thrift/Makefile | head -1 | cut -d= -f2 | tr -d ' ')
      THRIFT_FULL=$(grep '^THRIFT_VERSION_FULL\s*=' src/thrift/Makefile | head -1 | \
        cut -d= -f2 | tr -d ' ' | sed "s/\$(THRIFT_VERSION)/${THRIFT_VER}/")
      fetch_dsc src/thrift \
        "https://packages.trafficmanager.net/public/debian/thrift_${THRIFT_FULL}.dsc"
    displayName: 'Fetch external source trees (dget/tarball)'

  # Apply in-tree SONiC patches to all fetched source trees.
  # Auto-discovers patch dirs — no hardcoded paths.
  - script: |
      set -e

      apply_patches() {
        local src_dir="$1" patch_dir="$2"
        [ ! -d "$src_dir" ] || [ ! -d "$patch_dir" ] && return
        local count
        count=$(ls "$patch_dir"/*.patch 2>/dev/null | wc -l)
        [ "$count" -eq 0 ] && return
        echo "  $src_dir: $count patches"
        pushd "$src_dir" > /dev/null
        for p in $(ls "$OLDPWD/$patch_dir"/*.patch 2>/dev/null | sort); do
          git apply --whitespace=nowarn "$p" 2>/dev/null \
            && echo "    OK: $(basename $p)" \
            || echo "    SKIP (already applied): $(basename $p)"
        done
        popd > /dev/null
      }

      # For each patch dir, find the corresponding unpacked source subdir and apply.
      find src platform/mellanox -mindepth 1 -maxdepth 2 \
          \( -name patch -o -name patches \) -type d 2>/dev/null | sort | while read patch_dir; do
        count=$(ls "$patch_dir"/*.patch 2>/dev/null | wc -l)
        [ "$count" -eq 0 ] && continue
        parent=$(dirname "$patch_dir")
        src_dir=$(find "$parent" -mindepth 1 -maxdepth 1 -type d \
          ! -name patch ! -name patches ! -name debian ! -name '.git' \
          2>/dev/null | sort | head -1)
        [ -z "$src_dir" ] && echo "  SKIP $parent: no source dir" && continue
        apply_patches "$src_dir" "$patch_dir"
      done
    displayName: 'Apply source patches'

  - script: |
      echo "=== Workspace summary ==="
      echo "Submodule count: $(git submodule status --recursive | wc -l)"
      echo "Python files:    $(find . -name '*.py' \
        -not -path './.git/*' -not -path './target/*' -not -path './fsroot*' \
        -not -path './dpkg/*' 2>/dev/null | wc -l)"
      echo "C/C++ files:     $(find . \( -name '*.[ch]' -o -name '*.cpp' -o -name '*.hpp' \) \
        -not -path './.git/*' -not -path './target/*' -not -path './fsroot*' \
        -not -path './dpkg/*' 2>/dev/null | wc -l)"
      echo "Go files:        $(find . -name '*.go' \
        -not -path './.git/*' -not -path './target/*' 2>/dev/null | wc -l)"
    displayName: 'Workspace summary'

  # Publish source tree for downstream analysis jobs.
  # Excludes large dirs with no SONiC code (no patches, pure upstream C):
  #   p4lang             - 23 GB C++ compiler infrastructure
  #   sonic-linux-kernel - kernel source
  #   grub2              - bootloader (excluded: Debian CVE patches only, no SONiC patches)
  #   sonic-device-data  - platform JSON/config data, no code
  - script: |
      set -e
      DEST=$(Agent.TempDirectory)/sonic-buildimage-source
      mkdir -p "$DEST"
      rsync -a --delete \
        --exclude='.git' \
        --exclude='target/' \
        --exclude='fsroot*' \
        --exclude='dpkg/' \
        --exclude='src/p4lang/' \
        --exclude='src/sonic-linux-kernel/' \
        --exclude='src/grub2/' \
        --exclude='src/sonic-device-data/' \
        ./ "$DEST"/
      echo "Artifact size: $(du -sh "$DEST" | cut -f1)"
    displayName: 'Stage source tree for publish'

  - publish: $(Agent.TempDirectory)/sonic-buildimage-source
    artifact: sonic-buildimage-source
    displayName: 'Publish source tree for analysis jobs'
