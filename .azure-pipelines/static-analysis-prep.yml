# Static Analysis Preparation Pipeline
#
# Prepares a clean sonic-buildimage workspace with all submodules and
# externally-fetched source trees fully initialized, ready for static
# code analysis tools (bandit, semgrep, pylint, etc.).
# No build is performed.

trigger:
  branches:
    include:
      - master
      - 202*

pr:
  branches:
    include:
      - master
      - 202*

pool:
  vmImage: 'ubuntu-22.04'

steps:
  - checkout: self
    clean: true
    submodules: recursive
    fetchDepth: 1

  - script: |
      set -e
      # Sync submodule remote URLs (catches cases where .gitmodules URLs changed)
      git submodule sync --recursive
      git submodule update --init --recursive
    displayName: 'Sync submodules'

  # External source trees fetched via git clone at build time.
  - script: |
      set -e

      # flashrom (version pinned in rules/flashrom.mk)
      FLASHROM_VERSION=1.4.0
      if [ ! -d src/flashrom/flashrom-${FLASHROM_VERSION} ]; then
        git clone --depth 1 --branch v${FLASHROM_VERSION} \
          https://github.com/flashrom/flashrom.git \
          src/flashrom/flashrom-${FLASHROM_VERSION}
      fi

      # libpsample (Mellanox sflow)
      if [ ! -d src/sflow/libpsample ]; then
        git clone --depth 1 https://github.com/Mellanox/libpsample.git \
          src/sflow/libpsample
      fi

      # librdb (redis rdb-cli)
      if [ ! -d src/rdb-cli/librdb ]; then
        git clone --depth 1 https://github.com/redis/librdb.git \
          src/rdb-cli/librdb
      fi

      # oc-pyang (openconfig YANG tools, used by sonic-mgmt-common)
      if [ ! -d src/sonic-mgmt-common/models/yang/oc-pyang ]; then
        git clone --depth 1 https://github.com/openconfig/oc-pyang.git \
          src/sonic-mgmt-common/models/yang/oc-pyang
      fi
    displayName: 'Clone external source trees'

  # External source trees fetched via wget/tarball/dget at build time.
  # Only packages that have in-tree SONiC patches are fetched here.
  - script: |
      set -e
      sudo apt-get install -y -q devscripts

      dget_pkg() {
        local dir="$1" url="$2"
        if [ ! -d "$dir" ]; then
          echo "Fetching $(basename $dir)..."
          dget -u "$url"
        else
          echo "$(basename $dir) already present"
        fi
      }

      # ifupdown2 (wget tarball)
      IFUPDOWN2_VERSION=$(grep '^IFUPDOWN2_VERSION' rules/ifupdown2.mk | head -1 | cut -d= -f2 | tr -d ' ')
      if [ -n "$IFUPDOWN2_VERSION" ] && [ ! -d "src/ifupdown2/ifupdown2-${IFUPDOWN2_VERSION}" ]; then
        echo "Fetching ifupdown2 ${IFUPDOWN2_VERSION}..."
        curl -sL "https://github.com/CumulusNetworks/ifupdown2/archive/${IFUPDOWN2_VERSION}.tar.gz" \
          -o /tmp/ifupdown2.tar.gz
        tar -xzf /tmp/ifupdown2.tar.gz -C src/ifupdown2/
      fi

      # bash
      BASH_MAJOR=$(grep '^BASH_VERSION_MAJOR' rules/bash.mk | head -1 | cut -d= -f2 | tr -d ' ')
      BASH_FULL=$(grep '^BASH_VERSION_FULL' rules/bash.mk | head -1 | cut -d= -f2 | tr -d ' ' | \
        sed "s/\$(BASH_VERSION_MAJOR)/${BASH_MAJOR}/")
      cd src/bash
      dget_pkg "bash-${BASH_MAJOR}" \
        "https://deb.debian.org/debian/pool/main/b/bash/bash_${BASH_FULL}.dsc"
      cd -

      # isc-dhcp
      ISC_VER=$(grep '^ISC_DHCP_VERSION ' rules/isc-dhcp.mk | head -1 | cut -d= -f2 | tr -d ' ')
      ISC_FULL=$(grep '^ISC_DHCP_VERSION_FULL' rules/isc-dhcp.mk | head -1 | cut -d= -f2 | tr -d ' ' | \
        sed "s/\${ISC_DHCP_VERSION}/${ISC_VER}/")
      cd src/isc-dhcp
      dget_pkg "isc-dhcp-${ISC_VER}" \
        "http://deb.debian.org/debian/pool/main/i/isc-dhcp/isc-dhcp_${ISC_FULL}.dsc"
      cd -

      # kdump-tools
      KDUMP_VER=$(grep '^KDUMP_TOOLS_VERSION' rules/kdump-tools.mk | head -1 | cut -d= -f2 | tr -d ' ')
      cd src/kdump-tools
      dget_pkg "kdump-tools-${KDUMP_VER}" \
        "https://deb.debian.org/debian/pool/main/k/kdump-tools/kdump-tools_${KDUMP_VER}.dsc"
      cd -

      # libteam
      LIBTEAM_VER=$(grep '^LIBTEAM_VERSION :=' rules/libteam.mk | head -1 | cut -d= -f2 | tr -d ' ')
      LIBTEAM_FULL=$(grep '^LIBTEAM_VERSION_FULL' rules/libteam.mk | head -1 | cut -d= -f2 | tr -d ' ' | \
        sed "s/\$(LIBTEAM_VERSION)/${LIBTEAM_VER}/")
      cd src/libteam
      dget_pkg "libteam-${LIBTEAM_VER}" \
        "https://deb.debian.org/debian/pool/main/libt/libteam/libteam_${LIBTEAM_FULL}.dsc"
      cd -

      # libyang (v1 — used by older packages)
      LIBYANG_VER=1.0.73
      if [ ! -d src/libyang/libnl3-${LIBYANG_VER} ] && [ ! -d src/libyang/libyang-${LIBYANG_VER} ]; then
        git clone --depth 1 --branch v1.0-r4 \
          https://github.com/CESNET/libyang.git \
          src/libyang/libyang-${LIBYANG_VER}
      fi

      # libyang3
      LIBYANG3_VER=$(grep '^LIBYANG3_VERSION ' rules/libyang3.mk | head -1 | cut -d= -f2 | tr -d ' ')
      LIBYANG3_SUB=$(grep '^LIBYANG3_SUBVERSION' rules/libyang3.mk | head -1 | cut -d= -f2 | tr -d ' ')
      LIBYANG3_FULL="${LIBYANG3_VER}-${LIBYANG3_SUB}"
      LIBYANG_URL=$(grep '^LIBYANG_URL' src/libyang3/Makefile | head -1 | cut -d= -f2 | tr -d ' ')
      cd src/libyang3
      dget_pkg "libyang-${LIBYANG3_VER}" \
        "${LIBYANG_URL}/libyang_${LIBYANG3_FULL}.dsc"
      cd -

      # libnl3
      LIBNL3_BASE=$(grep '^LIBNL3_VERSION_BASE' rules/libnl3.mk | head -1 | cut -d= -f2 | tr -d ' ')
      LIBNL3_FULL=$(grep '^LIBNL3_VERSION ' rules/libnl3.mk | head -1 | cut -d= -f2 | tr -d ' ' | \
        sed "s/\$(LIBNL3_VERSION_BASE)/${LIBNL3_BASE}/")
      cd src/libnl3
      dget_pkg "libnl3-${LIBNL3_BASE}" \
        "https://deb.debian.org/debian/pool/main/libn/libnl3/libnl3_${LIBNL3_FULL}.dsc"
      cd -

      # lldpd
      LLDPD_VER=$(grep '^LLDPD_VERSION ' rules/lldpd.mk | head -1 | cut -d= -f2 | tr -d ' ')
      LLDPD_SUFFIX=$(grep '^LLDPD_VERSION_SUFFIX' rules/lldpd.mk | head -1 | cut -d= -f2 | tr -d ' ')
      LLDPD_FULL="${LLDPD_VER}-${LLDPD_SUFFIX}"
      BUILD_PUBLIC_URL=$(grep '^BUILD_PUBLIC_URL' rules/config | head -1 | cut -d= -f2- | tr -d ' ' | sed 's/?=//')
      BUILD_PUBLIC_URL=${BUILD_PUBLIC_URL:-https://packages.trafficmanager.net/public}
      cd src/lldpd
      dget_pkg "lldpd-${LLDPD_VER}" \
        "${BUILD_PUBLIC_URL}/debian/pool/main/l/lldpd/lldpd_${LLDPD_FULL}.dsc"
      cd -

      # lm-sensors (Debian epoch version: 1:3.6.0-7.1, DSC file uses 3.6.0-7.1)
      LM_MAJOR=$(grep '^LM_SENSORS_MAJOR_VERSION' rules/lm-sensors.mk | head -1 | cut -d= -f2 | tr -d ' ')
      LM_MINOR=$(grep '^LM_SENSORS_MINOR_VERSION' rules/lm-sensors.mk | head -1 | cut -d= -f2 | tr -d ' ')
      LM_PATCH=$(grep '^LM_SENSORS_PATCH_VERSION' rules/lm-sensors.mk | head -1 | cut -d= -f2 | tr -d ' ')
      LM_SUFFIX=$(grep '^LM_SENSORS_VERSION_FULL' rules/lm-sensors.mk | head -1 | sed 's/.*-//' | tr -d ' ')
      LM_VER="${LM_MAJOR}.${LM_MINOR}.${LM_PATCH}"
      LM_FULL="${LM_VER}-${LM_SUFFIX}"
      cd src/lm-sensors
      dget_pkg "lm-sensors-${LM_VER}" \
        "http://deb.debian.org/debian/pool/main/l/lm-sensors/lm-sensors_${LM_FULL}.dsc"
      cd -

      # openssh
      OPENSSH_VER=$(grep '^OPENSSH_VERSION :=' rules/openssh.mk | head -1 | cut -d= -f2 | tr -d ' ')
      OPENSSH_FULL=$(grep '^OPENSSH_VERSION_FULL' rules/openssh.mk | head -1 | cut -d= -f2 | tr -d ' ' | \
        sed "s/\$(OPENSSH_VERSION)/${OPENSSH_VER}/")
      cd src/openssh
      dget_pkg "openssh-${OPENSSH_VER}" \
        "https://deb.debian.org/debian/pool/main/o/openssh/openssh_${OPENSSH_FULL}.dsc"
      cd -

      # mellanox iproute2
      IPROUTE2_MLNX_VER=$(grep '^IPROUTE2_MLNX_VERSION\b' platform/mellanox/iproute2.mk | head -1 | cut -d= -f2 | tr -d ' ')
      IPROUTE2_MLNX_FULL=$(grep '^IPROUTE2_MLNX_VERSION_FULL' platform/mellanox/iproute2.mk | head -1 | cut -d= -f2 | tr -d ' ' | \
        sed "s/\$(IPROUTE2_MLNX_VERSION)/${IPROUTE2_MLNX_VER}/")
      cd platform/mellanox/iproute2
      dget_pkg "iproute2-${IPROUTE2_MLNX_VER}" \
        "http://deb.debian.org/debian/pool/main/i/iproute2/iproute2_${IPROUTE2_MLNX_FULL}.dsc"
      cd -
    displayName: 'Fetch external source trees (dget/tarball)'

  # Apply patches that are tracked in the repo but not yet applied
  # (these are applied during the build; apply them here for analysis).
  - script: |
      set -e

      apply_patches() {
        local dir="$1"
        local patch_dir="$2"
        if [ ! -d "$dir" ] || [ ! -d "$patch_dir" ]; then
          echo "  SKIP: $dir (dir or patch_dir missing)"
          return
        fi
        local count=$(ls "$patch_dir"/*.patch 2>/dev/null | wc -l)
        echo "  $dir: $count patches"
        pushd "$dir" > /dev/null
        for p in $(ls "$OLDPWD/$patch_dir"/*.patch 2>/dev/null | sort); do
          git apply --whitespace=nowarn "$p" 2>/dev/null \
            && echo "    OK: $(basename $p)" \
            || echo "    SKIP (already applied): $(basename $p)"
        done
        popd > /dev/null
      }

      apply_dir_patches() {
        # Find the unpacked source dir dynamically and apply patches
        local src_parent="$1"
        local patch_dir="$2"
        local src_dir=$(ls -d ${src_parent}/*/ 2>/dev/null | grep -v '\.git' | head -1)
        [ -n "$src_dir" ] && apply_patches "$src_dir" "$patch_dir" \
          || echo "  SKIP: no source dir found under $src_parent"
      }

      apply_dir_patches src/bash             src/bash/patches
      apply_dir_patches src/dhcprelay/dhcp4relay src/dhcprelay/dhcp4relay/patch
      apply_dir_patches src/isc-dhcp         src/isc-dhcp/patch
      apply_dir_patches src/kdump-tools      src/kdump-tools/patch
      apply_dir_patches src/libteam          src/libteam/patch
      apply_dir_patches src/libyang3         src/libyang3/patch
      apply_dir_patches src/libnl3           src/libnl3/patch
      apply_dir_patches src/lldpd            src/lldpd/patch
      apply_dir_patches src/lm-sensors       src/lm-sensors/patch
      apply_dir_patches src/openssh          src/openssh/patch
      apply_dir_patches platform/mellanox/iproute2 platform/mellanox/iproute2/patch
    displayName: 'Apply source patches'

  - script: |
      echo "=== Workspace summary ==="
      echo "Submodule count: $(git submodule status --recursive | wc -l)"
      echo "Python files:    $(find . -name '*.py' \
        -not -path './.git/*' -not -path './target/*' -not -path './fsroot*' \
        -not -path './dpkg/*' 2>/dev/null | wc -l)"
      echo "C/C++ files:     $(find . \( -name '*.[ch]' -o -name '*.cpp' -o -name '*.hpp' \) \
        -not -path './.git/*' -not -path './target/*' -not -path './fsroot*' \
        -not -path './dpkg/*' 2>/dev/null | wc -l)"
      echo "Go files:        $(find . -name '*.go' \
        -not -path './.git/*' -not -path './target/*' 2>/dev/null | wc -l)"
    displayName: 'Workspace summary'

  # Publish source tree for downstream analysis jobs.
  # Excludes large non-Python/non-SONiC dirs that are not analysis targets:
  #   p4lang             - 23 GB C++ compiler infrastructure, platform-specific
  #   sonic-linux-kernel - kernel source, not SONiC code
  #   grub2              - bootloader, pure C, Debian CVE patches only
  #   sonic-device-data  - platform JSON/config data, no code
  - script: |
      set -e
      DEST=$(Agent.TempDirectory)/sonic-buildimage-source
      mkdir -p $DEST
      rsync -a --delete \
        --exclude='.git' \
        --exclude='target/' \
        --exclude='fsroot*' \
        --exclude='dpkg/' \
        --exclude='src/p4lang/' \
        --exclude='src/sonic-linux-kernel/' \
        --exclude='src/grub2/' \
        --exclude='src/sonic-device-data/' \
        ./ $DEST/
      echo "Artifact size: $(du -sh $DEST | cut -f1)"
    displayName: 'Stage source tree for publish'

  - publish: $(Agent.TempDirectory)/sonic-buildimage-source
    artifact: sonic-buildimage-source
    displayName: 'Publish source tree for analysis jobs'
