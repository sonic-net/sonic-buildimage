pr: none
trigger: none

schedules:
- cron: "0 0 * * *"
  displayName: Daily Bazel Build
  branches:
    include:
    - master
  always: true


name: $(TeamProject)_$(Build.DefinitionName)_$(SourceBranchName)_$(Date:yyyyMMdd)$(Rev:.r)

resources:
  repositories:
  - repository: buildimage
    type: github
    name: sonic-net/sonic-buildimage
    endpoint: sonic-net
    ref: master


variables:
- template: .azure-pipelines/azure-pipelines-repd-build-variables.yml@buildimage
- template: .azure-pipelines/template-variables.yml@buildimage
- name: CACHE_MODE
  value: rcache
- name: ENABLE_FIPS
  value: y
- name: BUILD_BRANCH
  ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
    value: $(System.PullRequest.TargetBranch)
  ${{ else }}:
    value: $(Build.SourceBranchName)


stages:
- stage: BuildVS
  pool: sonicso1ES-amd64
  jobs:
  - template: azure-pipelines-build.yml
    parameters:
      buildOptions: 'USERNAME=admin SONIC_BUILD_JOBS=$(nproc) BUILD_WITH_BAZEL_WHEN_AVAILABLE=y BUILD_MULTIASIC_KVM=y INCLUDE_DHCP_SERVER=y ${{ variables.VERSION_CONTROL_OPTIONS }}'
      jobGroups:
      - name: vs
  - template: azure-pipelines-build.yml
    parameters:
      buildOptions: 'USERNAME=admin SONIC_BUILD_JOBS=$(nproc) BUILD_WITH_BAZEL_WHEN_AVAILABLE=y ${{ variables.VERSION_CONTROL_OPTIONS }}'
      jobGroups:
      - name: vpp
        continueOnError: true
  - template: azure-pipelines-build.yml
    parameters:
      buildOptions: 'USERNAME=admin SONIC_BUILD_JOBS=2 BUILD_WITH_BAZEL_WHEN_AVAILABLE=y ${{ variables.VERSION_CONTROL_OPTIONS }}'
      jobGroups:
      - name: alpinevs
        continueOnError: true

- stage: Build
  pool: sonicso1ES-amd64
  dependsOn: []
  jobs:
  - template: azure-pipelines-build.yml
    parameters:
      buildOptions: 'USERNAME=admin SONIC_BUILD_JOBS=$(nproc) BUILD_WITH_BAZEL_WHEN_AVAILABLE=y ${{ variables.VERSION_CONTROL_OPTIONS }}'
      jobGroups:
      - name: broadcom
        variables:
          swi_image: yes
          docker_syncd_rpc_image: yes
          dbg_image: yes
          platform_rpc: brcm
          INCLUDE_RESTAPI: y
      - name: mellanox
        variables:
          dbg_image: yes
          docker_syncd_rpc_image: yes
          session_monitor: yes
          platform_rpc: mlnx
      - name: marvell-prestera-arm64
        pool: sonicso1ES-arm64
        variables:
          PLATFORM_NAME: marvell-prestera
          PLATFORM_ARCH: arm64
      - name: marvell-prestera-armhf
        pool: sonicso1ES-armhf
        timeoutInMinutes: 1200
        variables:
          PLATFORM_NAME: marvell-prestera
          PLATFORM_ARCH: armhf
          INCLUDE_RESTAPI: y
      - name: nvidia-bluefield
        pool: sonicso1ES-arm64
        variables:
          PLATFORM_ARCH: arm64
      - name: aspeed-arm64
        pool: sonicso1ES-arm64
        variables:
          PLATFORM_NAME: aspeed
          PLATFORM_ARCH: arm64
