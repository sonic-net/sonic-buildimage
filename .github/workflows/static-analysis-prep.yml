# Static Analysis Preparation — GitHub Actions
#
# Prepares a clean sonic-buildimage workspace with all submodules and
# externally-fetched source trees fully initialized, ready for static
# code analysis tools (bandit, semgrep, pylint, etc.).
# No build is performed.
#
# All source acquisition logic lives in:
#   .azure-pipelines/scripts/prepare_source.py

name: Static Analysis Prep

on:
  push:
    branches:
      - master
      - '202*'
  pull_request:
    branches:
      - master
      - '202*'

jobs:
  prepare-source:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install dependencies
        run: sudo apt-get install -y -q devscripts

      - name: Prepare source tree
        run: |
          python3 .azure-pipelines/scripts/prepare_source.py \
            --repo-root . \
            --summary

      - name: Stage source tree
        run: |
          DEST=$RUNNER_TEMP/sonic-buildimage-source
          mkdir -p "$DEST"
          rsync -a --delete \
            --exclude='.git' \
            --exclude='target/' \
            --exclude='fsroot*' \
            --exclude='dpkg/' \
            --exclude='src/p4lang/' \
            --exclude='src/sonic-linux-kernel/' \
            --exclude='src/sonic-device-data/' \
            --exclude='src/sonic-gnmi/testdata/' \
            --exclude='src/snmpd/*/debian/' \
            ./ "$DEST"/
          # Remove any remaining files with colons in name (not valid on NTFS/Windows)
          find "$DEST" -name "*:*" -delete
          echo "Artifact size: $(du -sh "$DEST" | cut -f1)"
          echo "ARTIFACT_PATH=$DEST" >> $GITHUB_ENV

      - name: Upload source tree artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonic-buildimage-source
          path: ${{ env.ARTIFACT_PATH }}
          retention-days: 7

      - name: Compare artifact vs fresh clone
        run: |
          # Shallow clone of upstream sonic-net/sonic-buildimage (no submodules)
          FRESH=$RUNNER_TEMP/sonic-buildimage-fresh
          git clone --depth 1 --no-local \
            https://github.com/sonic-net/sonic-buildimage.git "$FRESH"

          ARTIFACT=${{ env.ARTIFACT_PATH }}

          # Build set of submodule paths (depth 1 and 2) to exclude from diff —
          # submodule dirs differ structurally between a shallow clone (empty) and
          # the artifact (fully populated), which would flood the output.
          SUBMODULES=$(git -C "$FRESH" submodule status --recursive 2>/dev/null \
            | awk '{print $2}' | sort)

          # Helper: list dirs at max depth 3 under $1, relative to $1,
          # excluding .git and known submodule paths
          list_dirs() {
            local base="$1"
            find "$base" -mindepth 1 -maxdepth 3 -type d \
              | sed "s|$base/||" \
              | grep -v '^\.' \
              | grep -v '^\.git' \
              | sort
          }

          # Filter out any path that starts with a submodule root
          filter_submodules() {
            while IFS= read -r path; do
              skip=0
              while IFS= read -r sub; do
                case "$path" in
                  "$sub"|"$sub"/*) skip=1; break ;;
                esac
              done <<< "$SUBMODULES"
              [ "$skip" -eq 0 ] && echo "$path"
            done
          }

          ARTIFACT_DIRS=$(list_dirs "$ARTIFACT" | filter_submodules)
          FRESH_DIRS=$(list_dirs "$FRESH" | filter_submodules)

          echo ""
          echo "=== In ARTIFACT but NOT in fresh clone (externally fetched source) ==="
          comm -23 <(echo "$ARTIFACT_DIRS") <(echo "$FRESH_DIRS") || echo "  (none)"

          echo ""
          echo "=== In fresh clone but NOT in ARTIFACT (excluded or missing) ==="
          comm -13 <(echo "$ARTIFACT_DIRS") <(echo "$FRESH_DIRS") || echo "  (none)"
